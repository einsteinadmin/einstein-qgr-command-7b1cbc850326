t the start of the quarter, not mid-quarter. Queue his data requests weeks or months ahead since his plate is consistently full. Anything needing Matisen has to get on his radar as early as possible.\n\n- Carry into Q3? Carry, request already submitted to Matisen; performance-tied promotions framework and comms roll forward once his data comes back.\n\n## N. Austin Office Move-In — CRIT: yes\n\n- Color: Super Green (PROJ)\n\n- Results: Moved in 6/15, beating the Super Green bar (moved in by June 15) and clearing Green (by end of June) with room to spare. 100% complete, no open blockers.\n\n- How we got here: Stayed heavily involved personally, regular communication with Novo and the North Austin team, kept the 6/15 target date visible to everyone, and made the call to move in even with a few final touches not yet perfect rather than let those hold up the date.\n\n- Went well: Hands-on ownership, proactive blocker-clearing, a dedicated Novo project board to track pulses and actions across parties, and prioritizing the date over chasing perfection. Big morale boost for the team operating out of the new space.\n\n- Differently / Q3 lesson: (1) For multi-party projects, stand up a dedicated project board, it made tracking far easier across Novo and the team. (2) Stay on top of blockers and clear them as fast as possible, don't let them sit.\n\n- Carry into Q3? Close, hit Super Green. Final touches wrap as the team settles in.\n\n## Branch Visits — CRIT: no\n\n- Color: Green (PROJ) — self-acknowledged as technically Yellow against the literal April bar\n\n- Results: 2 of 3 planned visits complete (Leander w/ Brian, Dallas/DFW w/ Cameron on 7/14). Third visit not happening this quarter. Only 1 of 2 required ride-alongs completed (Leander); Dallas ride-along was displaced by manager discussions. Both listen-and-learn lunches happened (Leander and Dallas).\n\n- How we got here: Leander visit was deliberately scheduled to align with Brian's branch visit. Dallas visit was opportunistic, riding along with other travel, and the ride-along there got bumped by more pressing in-person manager conversations.\n\n- Went well: Manager face time and both listen-and-learn lunches landed despite the ride-along miss. Deliberate scheduling around Brian's Leander visit worked well.\n\n- Differently / Q3 lesson: Simplify the definition itself, drop the ride-along/specific-activity requirement and just require two full visits. Deliberately sync visit scheduling with when Brian or Mike are already at a branch, rather than relying on opportunistic travel.\n\n- Carry into Q3? Close. Third visit isn't happening this quarter; carry the scheduling/definition lesson into how Q3 visits get set up.\n\n## Geographic Expansion Strategy — Deepen vs. Widen + Evaluate 5-7 Acquisition Opportunities — CRIT: no\n\n- Color: Red (PROJ)\n\n- Results: 5% complete. 7/10 kickoff milestone missed, no structured evaluation of acquisition targets started. Only partial Houston organic-vs-acquisition data pulled with Ben (general Houston performance + expectations), no actual acquisition targets gathered. Neither Green (5 evaluated) nor Super Green (7 evaluated) reachable with 11 days left.\n\n- How we got here: Second consecutive quarter without real traction, the Houston case study originally targeted for Q1 rolled into this Q2 Green bar and still isn't done. Root cause is prioritization; this kept losing to more urgent fires rather than being blocked by bandwidth or ownership.\n\n- Went well: The Houston performance data pull with Ben is a real foundation to build on in Q3.\n\n- Differently / Q3 lesson: Set the framework and strategy at the start of the quarter instead of letting it drift. Plan to lean on strategies from the Q3 Ideal Team Player discussion work to push this across the line. Needs to become a higher priority, not another quarter losing to urgent fires.\n\n- Carry into Q3? Carry, and elevate priority. This is now two quarters without traction.\n\n## Ideal Team Player Reading — CRIT: no\n\n- Color: Green (PROJ)\n\n- Results: Book finished ~7/5 or sooner, 1-page reflection on Humility/Hunger/Smarts gaps done the week before the Rob meeting. Clears the Green bar (read by EOQ + reflection); missed Super Green (read by 5/30).\n\n- How we got here: Reading itself got prioritized early in the quarter. The reflection write-up lagged until the week before the Rob meeting.\n\n- Went well: Early prioritization of the reading itself.\n\n- Differently / Q3 lesson: Strategies now being put in place to improve the Hungry aspect surfaced in the reflection.\n\n- Carry into Q3? Close on the reading goal; carry the Hungry-improvement strategies forward as active work.\n\n## Easy Wins on Money Collection Process — CRIT: no\n\n- Color: Green (PROJ)\n\n- Results: Significant progress made over the weekend of 7/18-19. Framework built out, most pieces in place across all three sub-improvements (swipe % reporting automation, manual-vs-swipe cost quantification, late-invoice Monday pulse automation), just needs a couple tweaks, especially automating routines with Claude Code. On target for Green, up from Yellow as of the 7/16 snapshot.\n\n- How we got here: Got pushed behind higher-priority work for most of the quarter (PH comp, N. Austin, TED/BET, Prosper CFO transition). Picked back up and made real progress once time was actually blocked for it this past weekend.\n\n- Went well: Enjoyed the work once time was made for it; a weekend push closed most of the gap.\n\n- Differently / Q3 lesson: Block dedicated calendar time for this kind of automation work earlier in the quarter instead of waiting for it to get squeezed into a weekend. Part of the time-blocking strategies going into Q3.\n\n- Carry into Q3? Close, expected to land Green with a couple final tweaks."}, {"key": "amanda", "name": "Amanda Ware", "short": "Amanda", "role": "Director of CX (sales + claims)", "aar_source": "Sky Board AAR pulse 12578917480 (via Gary export); grade board in aar- sat in another team's queue was a stretch — shouldn't be baked into a quarter's bar again. Surface system constraints (like one-email-per-branch) before locking a test plan.\n\n- Carry into Q3? Carry — extend the same design principles (shorter, more interactive video, fewer words) to the rest of the email suite.\n\nIdeal Team Player Reading — CRIT: no\n\n- Color: SG\n\n- Results: Book finished and 1-page reflection submitted live at the 7/15 Rob Lynch session — ahead of the 7/31 EOQ bar.\n\n- How we got here: Squeezed reading in around an extremely busy quarter with no dedicated block.\n\n- Went well: Got it done despite the volume of everything else this quarter.\n\n- Differently / Q3 lesson: Nothing.\n\n- Carry into Q3? Close — done and submitted. Nhel and Carly to hold Amanda accountable on personal-development commitments moving forward.\n\nCX Q2 Theme Rollout - Managing Claims — CRIT: no\n\n- Color: SG\n\n- Results: Weekly stats and rhythm sustained all quarter; contest closed last week, winners finalizing by 7/21.\n\n- How we got here: Fast 5-day pre-launch (5/13–17), consistent weekly cadence for 9 weeks straight.\n\n- Went well: Gave CET a scoreboard on par with the Einstein Games the rest of the org gets — closing a real morale gap, since CET normally has to build its own in-house stats with no IT-delivered dashboards.\n\n- Differently / Q3 lesson: Not a correction — an evolution. Keep the format, swap the theme, pull it closer to the branches-game structure next time.\n\n- Carry into Q3? Carry — continue the leaderboard/game format with a new theme.\n\nAI Call Grading and Regular Reporting to Improve Conversions/Estimate Accuracy — CRIT: yes\n\n- Color: R\n\n- Results: Weekly call audits have run since 6/11 with one broken week (week two), otherwise consistent through last week. Estimate accuracy sits at 52%, below the 54% Red line regardless of cadence.\n\n- How we got here: Week two's break was never root-caused, just fixed once noticed. The real driver: this quarter's capacity crunch — extra sales classes, Carly out on maternity leave, an overwhelming lead volume, and Nhel/Tetet pulled into front-line sales (auto bookings, phones) instead of coaching. The actual coaching loop that would move accuracy never happened because the people meant to run it were absorbed into operational firefighting.\n\n- Differently / Q3 lesson: For Q3, Nhel and Tetet's goals narrow to coaching and follow-up only — nothing else. Broader lesson: slow down before speeding up — button up and stabilize current processes with smooth, consistent communication before layering on anything new.\n\n- Carry into Q3? Restructure — figure out a way to automatically deliver results to each person week to week. Have RMs, Nhel, and Tetet focus in on delivering feedback to lower performers."}, {"key": "brian", "name": "Brian Herzig", "short": "Brian", "role": "CTXH Regional Manager + Culture Head", "aar_source": "cos-vera repo q2-aar-2026-07-20.md (retrieved 7/20; originally never posted to pulse — spoke-template gap noted)", "goals": [{"goal": "Einstein Games Season 3 Launch (CTXH)", "critical_number": true, "self_grade": "R", "proj_grade": "Y", "evidence": "Honest down-flip on a CRIT. Regional avg ~6.6 vs 7 bar (NA 5.0, HOU 6.2 below bar; SA/SAN 7.0, LEA 7.8). Root gap: no weekly cadence turning game data into delivered coaching at NA/HOU. Note: Mike grades the same program G on a weekly-average basis — methodology fork for QGR.", "carry": "carry (S4 with week-1 dashboards)", "final_grade": null}, {"goal": "Hiring + Personnel Budgets + People Analyzer", "critical_number": true, "self_grade": "G*", "proj_grade": "G", "evidence": "eNPS June-not-May; LEA 91% (up from 84%). Big owning: BM-hire scorecard process 'a failure' — rushed, not fair to senior people (matches Frank/Khevan fallout). Q3 ask: performance-mirror evals + demand-based staffing model.", "carry": "carry", "final_grade": null}, {"goal": "Scrum Accountability Pt 4 — Manager Certification", "critical_number": false, "self_grade": "G", "proj_grade": "G", "evidence": "Full cert system built; rollout = first 2 weeks of Q3.", "carry": "carry (rollout leg)", "final_grade": null}, {"goal": "Branch Visits / Audits", "critical_number": false, "self_grade": "G", "proj_grade": "G", "evidence": "3 of 5 branches, structured with scorecard audits. Lesson: protect travel + share findings back.", "carry": "carry", "final_grade": null}, {"goal": "Training Day Overhaul + Calendar", "critical_number": false, "self_grade": "R", "proj_grade": "Y", "evidence": "Honest flip. Calendar shipped; stations core never built. His words: 'an un-sent delegation = no progress.'", "carry": "carry/restructure", "final_grade": null}, {"goal": "Ideal Team Player Reading", "critical_number": false, "self_grade": "G", "proj_grade": "G", "evidence": "Virtue REVISED Hunger->Smart: lacks courage for direct coaching conversations — names it as the mechanism behind both the BM-process fallout AND the NA/HOU coaching gap.", "carry": "close", "final_grade": null}], "wins": ["LEA 91% up from 84%", "Manager cert system fully built", "Structured branch audits with findings"], "losses": ["Games S3 CTXH below bar at NA/HOU (CRIT R)", "TD Overhaul stations core never built", "BM-hire scorecard process owned as a failure"], "biggest_opportunity": "Performance-mirror evals as the BM promotion lens (validates productizing the Frank-mirror pattern) + demand-based staffing model (pairs with Matisen's TUR/FTE work)", "lessons": ["An un-sent delegation is no progress", "Missing courage for direct coaching conversations is the common root of two separate misses", "Data without a weekly delivered-coaching cadence doesn't move scores"], "shoutout_candidates": ["Two voluntary down-flips including a CRIT — most self-critical AAR of the set"], "historical": {"q1_2026_success_rate": "4/5 = 80% (Branch Visits R)"}, "flags": [], "fullText": "# Q2 AAR — Brian Herzig — 2026-07-20\n\n## Einstein Games Season 3 Launch (CTXH) — CRIT: yes\n- Color: R (PROJ)\n- Results: Company 7.1 → Green; my CTXH region red. NA and HOU likely under the 7 bar, SA borderline (could clear 7 — TBD today), LEA 7.8, regional avg ~6.6. Playoffs: San Antonio takes the championship if numbers hold; Leander lost the 3rd-place game. Final figures pending Matisen's number update + the damage-data reconciliation.\n- How we got here: My follow-up as regional was thin on coaching and guidance for NA and Houston. The managers ran their scorecard review and analysis, but little coaching actually followed from it in those two branches. Houston's attendance was the anchor we couldn't beat. Engaged branches (LEA, SA) owned their results and it showed. Root gap: no weekly cadence that turns branch data analysis into named coaching that actually gets delivered and checked.\n- Went well: Engaged branches owned their results; San Antonio's championship; the scorecard review/analysis process was at least running.\n- Differently / Q3 lesson: A weekly accountability cadence where management owns the loop — data analysis → weekly action plan (who they'll coach, what they'll do) → end-of-week proof it got done. I inspect the loop; I don't run the analysis and coaching myself. I don't have capacity to find weak players and build coaching for every branch — management has to own that.\n- Carry into Q3? carry / restructure — becomes the weekly management-accountability cadence rock\n\n## Hiring + Personnel Budgets + People Analyzer — CRIT: yes\n- Color: G* (PROJ) — Green with an asterisk\n- Results: eNPS completed across all teams by end of June; NA BM vacancy closed (Daniel hired); 4/5 branches over 100% avg FTE budget for the month; Leander the lone branch under (averaging 91%, up from 84% last quarter). Not SG — eNPS landed June not May, and LEA under 100%.\n- How we got here: Other branches recovered from an initial hiring blitz; LEA lagged and is climbing back (May rough, Frank recovered in June, July climbing and hiring — lost one person when we hired someone else). The BM-fill is a win with Daniel, but I'd grade my overall process to fill the role a failure. I built a scorecard, but it didn't create real context for managers' level of performance — it was a quick, high-level review of what leadership already intuitively knew, not a fair or respectful lens for senior team members up for a promotion. That's consistent with the critical feedback from Frank, Khevan, and what I expect from Nick: none are upset with who we hired, but all have process frustrations. I rushed it. What we actually needed was the \"performance mirror\" Cameron built.\n- Went well: eNPS done on time across all teams; NA BM filled with the right person; 4/5 branches over 100% FTE (LEA 91%, up from 84% last quarter); don't expect any C players on the team.\n- Differently / Q3 lesson: (a) Use the performance mirror, not a rushed scorecard, for any promotion or eval — the fair, evidence-based lens senior people deserve. (b) Fix the staffing model — real analysis of FTE, running TUR, and leads-available to run trucks (RDOs, 3-man teams) so we know the true headcount to capture demand, especially busy season. If the goal is running every truck May–July, staff for it in advance; Q1 budgets built on running trucks 79–93% of the time forced late, unrealistic stretch goals and left us with untrained hires and too few leads to run them.\n- Carry into Q3? carry / restructure — performance-mirror eval process + demand-based staffing model\n\n## Scrum Accountability Pt 4: Manager Certification — CRIT: no\n- Color: G (PROJ)\n- Results: All CTXH managers scored with a grade; grading cadence written into the guidelines; CERT framework built; overall training module; Monday training board; instructions to leads; training build-out; glossary of definitions; reference HQ for the whole process. Certification rollout is teed up for Q3 — every board managed and certified within the first couple weeks, then held with the follow-up cadence.\n- How we got here: Solved the cadence problem that stalled every prior Scrum part and built the full certification scaffolding this quarter — framework, module, board, glossary, HQ. What's left is the rollout itself (managers actually run through certification), landing early Q3. Bandwidth from Games, the BM hire, and Frank meant the rollout didn't happen in Q2, but the system to do it did.\n- Went well: The weekly cadence works and fixed hygiene fast; all 5 BMs engaged; a complete, repeatable certification system ready to switch on — not just a scorecard.\n- Differently / Q3 lesson: Sequence build and rollout inside the same quarter so the deliverable lands, not just the scaffolding. Q3: certify every board in the first two weeks, then hold the follow-up cadence so boards stay on point and grades stay current.\n- Carry into Q3? carry — certification rollout + sustained cadence\n\n## Branch Visits / Audits — CRIT: no\n- Color: G (PROJ)\n- Results: 3 of 5 CTXH branches visited with scorecard audits + huddle assessments — green bar cleared. Next target South Austin, possibly Friday. Findings summarized and shared with BMs is the open tail.\n- How we got here: Scheduling was the lever. The BM hiring chain landing in the last month of the quarter took precedence over traveling to the remaining branches — a fair trade, but it capped coverage at three.\n- Went well: Consistent visit rhythm; the scorecard-audit + huddle-assessment format gave each visit real structure.\n- Differently / Q3 lesson: Protect branch travel in the schedule even when hiring and other fires compete — it's the first thing that slips. Close the loop by sharing findings back with BMs, and push for full 5/5 coverage.\n- Carry into Q3? carry — finish the region and share findings back\n\n## Training Day Overhaul + Calendar Organization — CRIT: no\n- Color: R (PROJ)\n- Results: TD Calendar app live and posted company-wide — event info, swag, meal details, feedback link (July + August). The training-day stations overhaul was not built, and quizzes/scorecards/Games integration are not in. Can get the stations overhaul onto the FMs' boards this week, but closing the gap before 7/31 isn't likely.\n- How we got here: Shipped the calendar/logistics layer company-wide — real and useful — but the stations overhaul, the core of the definition, didn't get built. I meant to delegate it to the Field Managers and never got the delegation out, so it sat. Bandwidth, and the work drifted to the logistics layer instead of the curriculum layer.\n- Went well: Calendar app is live company-wide with event info, swag, and meal details plus a feedback loop — a solid platform to build the real overhaul onto.\n- Differently / Q3 lesson: Delegate the stations overhaul to the FMs and get it on their boards early (this week). Lesson: an un-sent delegation is the same as no progress — get it out the moment you decide it, don't sit on it.\n- Carry into Q3? carry / restructure — delegated stations overhaul\n\n## Ideal Team Player Reading — CRIT: no\n- Color: G (PROJ)\n- Results: Book finished by 7/31; 2nd assessment complete; rerunning my CRIT one-pager based on feedback from the group session. Reflection already delivered to Rob ahead of the deadline.\n- How we got here: Held pace through the Roundtable group cadence (reading alongside Cameron and Mike). The group session deepened the reflection — I revised my low virtue from Hunger to Smart: I read people, emotions, and motivations well, but I lack the trust/courage to have direct coaching and critical conversations often enough.\n- Went well: Kept pace through a busy quarter; reflection delivered early; the group session produced real self-insight (the virtue reassessment). Also pursuing a peer evaluation where my team rates me on the virtues for more insight.\n- Differently / Q3 lesson: Fix the feedback pattern — I soften coaching with positives to dampen the blow, which makes feedback unclear, and then I grade individuals much more harshly later when they aren't prepared for it. That's unkind, and it's the same mechanism behind this quarter's process fallout (Frank/Khevan/Nick) and the NA/HOU coaching gap. Give clear, direct, timely feedback to elevate \"Smart.\"\n- Carry into Q3? carry — the \"Smart\" / direct-feedback growth thread (the book itself closes 7/31)"}, {"key": "mike", "name": "Mike Vandenbroader", "short": "Mike", "role": "DFWT Regional Manager + Head of Operations", "aar_source": "Sky Board AAR pulse 12578917480 (via Gerald export); grade board in aar-compile-2026-07-20.md", "goals": [{"goal": "Personnel Mgmt — Manager Hiring + New Manager Development (Garland/Tampa)", "critical_number": true, "self_grade": "SG", "proj_grade": "G", "evidence": "Up-flip. Region staffing 106-111% of quarter goal; Tampa >115%; hiring dashboard + aim-high rule. Carry: McKinney gap.", "carry": "carry (McKinney gap)", "final_grade": null}, {"goal": "Einstein Games Season 4 Launch (DFWT)", "critical_number": true, "self_grade": "G", "proj_grade": "SG", "evidence": "Down-flip + METHODOLOGY FORK: weekly-average 8.16 = GREEN vs pooled-quarter 7.60 = RED — a full color swing on a Critical Number. He grades on the played-and-coached basis (defensible) but himself calls for locking ONE canonical method before Q3 scoring. Feeds Matisen's T3 automation spec.", "carry": "carry (S4 with canonical scoring method)", "final_grade": null}, {"goal": "Fleet Safety Pt 2", "critical_number": false, "self_grade": "R", "proj_grade": "R", "evidence": "Agree. QTD company 89 vs 90 bar (weekly 92-94 masked it). Honest flip made 7/16.", "carry": "carry (close 1-pt gap + offload audit)", "final_grade": null}, {"goal": "Mover Training Handbook / Training App", "critical_number": false, "self_grade": "SG", "proj_grade": "SG", "evidence": "Agree. Open to ALL of DFWT, 3 weeks running, zero bugs. Live-HQ pattern maintained through the build made the AAR trivial.", "carry": "restructure (company-wide rollout + adoption metric)", "final_grade": null}, {"goal": "Ideal Team Player Reading", "critical_number": false, "self_grade": "SG", "proj_grade": "SG", "evidence": "Agree. Book + one-pager + team survey run (4.0/4).", "carry": "carry (execute 90-day)", "final_grade": null}], "wins": ["Training app: 3 weeks, all of DFWT, zero bugs", "Staffing 106-111% with weekly dashboard + aim-high rule", "Live build-HQ pattern"], "losses": ["Fleet safety 89 vs 90 — weekly reads masked the QTD miss"], "biggest_opportunity": "Lock one canonical Games scoring method before Q3; training app -> company-wide chassis", "lessons": ["Weekly dashboard cadences win (hiring, fleet)", "Read early, not at peak (time-block lesson)", "Maintain a live HQ through the build — the AAR writes itself"], "shoutout_candidates": ["Training app build quality (zero bugs, whole-region rollout)", "Live-HQ pattern as a standardizable practice"], "historical": {"q1_2026_success_rate": "4/5 = 80% (Branch Visits R; truck-sales status green but assessment said red — caveat)"}, "flags": ["Games methodology fork = divergence conversation #2 for QGR", "His honest ops note: the '30-min' AAR task took 1h41+36m — estimate honestly (SOP learnings ledger)"], "fullText": "# Q2 AAR — Mike Vandenbroader — 2026-07-20\n\n## Fleet Safety (QT Management) — CRIT: no\n\n- Color: R (PROJ)\n\n- Results: Company quarter score 89 vs 90 Green — 1-point miss, all branches above 80 qtr score. High-risk drivers 25 of 229 = 10.9%, well under the 15% cap (Green on risk mix). With under 2 weeks left, 90 is not projected by 7/31. Score misses; risk mix clears.\n\n- How we got here: Merged all Samsara accounts into one, leveling scoring weights and settings across branches for consistency. Built the driver safety dashboard + 300-mile gate, which isolated true low performers for weekly warnings/coaching and stopped low-mileage drivers from being mislabeled high risk. Dashboard also exposed whether managers were actually coaching or letting bad records sit stale.\n\n- Went well: Driver safety dashboard was a major win — easier for managers, coaching reached the drivers who truly needed it each week. Merged accounts made dismissed-alert auditing fair and consistent across all drivers without branch-switching.\n\n- Differently / Q3 lesson: Offload the weekly Samsara audit/clear + dashboard update to an RO or dedicated person so it moves fast and isn't sidelined by other work. Keep the chase list + pulse creation for managers who didn't issue prior-week coaching (started in the final weeks — make it standing).\n\n- Carry into Q3? carry — system works; close the 1-point score gap and offload the weekly audit so it holds.\n\n\n## Mover Training App / Super App Chassis — CRIT: no\n\n- Color: SG (PROJ)\n\n- Results: Beta live in the field across multiple branches. 25 movers in active training (some 60-70% complete), 5 active manager accounts running training daily. ZERO bugs across the full beta. Scope exceeded the original MVP — now a full onboarding, training, coaching and check-in tool covering a hire's first 90 days through to lead. Multiple feature/content updates shipped mid-beta without issue, plus a sandbox SOP training for manager onboarding (never available in prior rollouts). Build breakdown: Q2 Rock Review PDF + live HQ (einsteinadmin.github.io/einstein-mover-training-hq-8fe42f5c).\n\n- How we got here: Built past a test-the-concept MVP into a full hiring-and-training system, hardened through a live beta with real movers and managers, iterating on feedback. Live build HQ kept the project on track throughout.\n\n- Went well: Nearly all of it — but the transferable win is the live build HQ, maintained continuously through the build. Kept Mike on track, tracked the whole build, and made the AAR build story trivial to assemble. Standardize on every future multi-week project.\n\n- Differently / Q3 lesson: Nothing to change on the build itself. Lesson: the live build HQ pattern is the carry-forward — make it standard on every multi-week project.\n\n- Carry into Q3? restructure — build/beta goal met SG; Q3 rock becomes full company-wide rollout + an adoption metric.\n\n\n## Einstein Games (EMC) — DFWT — CRIT: yes\n\n- Color: G (PROJ)\n\n- Results: Season 3 closed 7/11 — final. DFWT quarter average 8.16 clears the 8.0 Green bar (below 9.0 SG), scored as the average of each branch's weekly scores across the season — the basis the Games are played and coached on (weekly resets, weekly coaching). Branch spread: Dallas 6.1, Fort Worth 9.2, Garland 8.1, McKinney 7.2, Tampa 10.2 — independently reproduced from the live source (8.18). Methodology note: the pooled-quarter-aggregate view (Gerald's coaching dashboard, re-scored from quarter-total raw metrics) reads 7.60 = RED, a full color apart. Grade stands GREEN on the weekly-average method; the fork is a methodology gap to close, not a data error. Green on a Critical Number.\n\n- How we got here: Dallas anchored the region all quarter — underperformed nearly every metric except Attendance, worst on Reviews and Damages. McKinney dragged on driver safety, then Reviews/Damages. Fort Worth strong minus Attendance. Garland strong minus Reviews/team engagement on gathering them. Tampa exceptional across the board (lowest was Attendance at 8). Region-wide, Reviews and Attendance were the swing factors. Late-quarter, built a low-performer/issue-ID dashboard + a QG tracking dashboard that forced managers to speak to their plans — too late to move the season much, now weekly coaching tools going forward.\n\n- Went well: Nothing structurally different from prior seasons drove the result. The two late-quarter dashboards (issue-ID + QG tracking) are the forward assets — better insight into how branches were managed and manager accountability to a plan.\n\n- Differently / Q3 lesson: Stay on it every single week — force managers to deep-dive their issues, build real plans, and track those plans weekly so they stick and deliver. Had the dashboards existed from week 1, the number goes higher. Q3: dashboards live and weekly deep-dives from the season's first week. Also lock the canonical scoring method (weekly-average vs pooled-quarter) up front — the two disagree by a full color, and a Critical Number can't land two ways at QGR.\n\n- Carry into Q3? carry — recurring seasonal goal; bake weekly deep-dives + dashboards in from week 1 of Season 4.\n\n\n## Ideal Team Player — CRIT: no\n\n- Color: SG (PROJ)\n\n- Results: Book read + one-pager = Green banked. SG earned via a leadership-reviewed 90-day implementation plan — a byproduct beyond the original goal scope. Completing a 90-day plan was never achievable in-quarter (execution alone spans a full quarter), so SG grades on producing and operationalizing the plan, not finishing it. Plan PDF on file.\n\n- How we got here: Read the book (resented it as a distraction from peak-quarter workload), completed the one-pager, built the 90-day plan and reviewed it with leadership.\n\n- Went well: Despite hating the mid-quarter reading exercise, real value landed in the one-pager + 90-day plan; the plan is expected to have genuine benefit.\n\n- Differently / Q3 lesson: Get the reading rock out of the way early in the quarter so it doesn't compete with the region + department-head + heavy-goal load at peak.\n\n- Carry into Q3? carry — book/one-pager done; execute the 90-day plan and capture applied results.\n\n\n## DFWT Personnel (Regional Hiring) — CRIT: yes\n\n- Color: SG (PROJ)\n\n- Results: DFWT regional average 107% (105% SG bar cleared). Per branch: Dallas 113%, McKinney 93%, Garland 100.9%, Fort Worth 109.8%, Tampa 120%. Four of five branches at/above 100% — McKinney the lone anchor at 93%. Broad-based SG, not one branch carrying.\n\n- How we got here: A real system, not luck. Built a hiring-goal dashboard tracking each branch to goal, shared results + expectations clearly each period with the specific target to aim for, and set a standing rule to aim above the line at ~110-120% to stay overstaffed. McKinney struggled with the overstaffing concept and anchored the region.\n\n- Went well: Same — the dashboard + clear per-period goals + the aim-high overstaffing rule drove broad performance across four branches.\n\n- Differently / Q3 lesson: Weekly dashboard tracking is the lesson and the carry-forward. Fragility: McKinney's grasp of overstaffing is the soft spot — if dashboard discipline lapses, McKinney regresses.\n\n- Carry into Q3? carry — keep the dashboard + aim-high rule; close McKinney's overstaffing gap.\n\n@Cameron Brown @Paul Morin"}, {"key": "matisen", "name": "Matisen Harper", "short": "Matisen", "role": "Director of IT", "aar_source": "Sky Board AAR pulse 12578917480 (via CoS-MH1 export); grade board in aar-compile-2026-07-20.md", "goals": [{"goal": "AI Wedge Audit + MVP Scoping", "critical_number": true, "self_grade": "G", "proj_grade": "G", "evidence": "Agree. Audit done, 3 builds validated + in build; the 4-6-wedge sweep = unwritten doc (the SG gate that never closed).", "carry": "close", "final_grade": null}, {"goal": "Variable Pricing Full Rollout + Weekly Review Cadence", "critical_number": true, "self_grade": "SG", "proj_grade": "G", "evidence": "Up-flip. Phase 1 fully live, Tuesday cadence a real operating rhythm, cadence-driven development pattern.", "carry": "carry (personnel leg + hiring budgets)", "final_grade": null}, {"goal": "AI Call Grading + Claims RAG", "critical_number": false, "self_grade": "R", "proj_grade": "Y", "evidence": "Down-flip. Substitution (Claims RAG out, Games automation in) never re-scored — 'give every deliverable its own ship date.'", "carry": "restructure (merge into sales dashboard)", "final_grade": null}, {"goal": "ClearCo + Rippling API -> HR Dashboard", "critical_number": false, "self_grade": "G", "proj_grade": "G", "evidence": "Agree. HR Command Center LIVE — all hiring funnels visualized.", "carry": "carry (SG remainder + webhook)", "final_grade": null}, {"goal": "Production Line Cleanup — 8 Loose Th elected Builds) — CRIT: yes\n- Color: G (PROJ)\n- Results: Audit complete by 5/30; 3 builds validated + MVP-scoped with one mid-quarter substitution — Call Grading (complete, polishing), Anne's Hiring Funnel (complete, polishing), Automated Einstein Games (subbed for paused Claims RAG; QA'ing Thursday's deployment now). First build kicked off well before EOQ. Additional wedge candidates already exist in practice — Sage Intacct integration (big for finance), Botpress, new email platform — so the 4+-wedge sweep gap is documentation/scoring, not discovery; it never became a scored artifact. SG needs the sweep written down + Games across the finish line — Games QA is the open risk (rocky data sources).\n- How we got here: The three pre-selected builds absorbed all capacity, and mid-quarter we made a deliberate portfolio swap — Claims RAG paused, Automated Einstein Games promoted on immediate operational pull. The brutal part: the substitution was never re-scored through the sweep's effort/impact gate, and the sweep doc never got its own ship date, so the Green gate now rests on an unwritten document. Games QA is genuinely hard — rocky data sources make it the one piece that may not cross by 7/31. If it holds, Claims RAG becomes wedge #4 — sequenced, not stacked.\n- Went well: Validate-then-build discipline — first call-grading report shipped with a ≥15-call spot-check before scaling; builds were handed to real owners early instead of polished in isolation.\n- Differently / Q3 lesson: Give every audit deliverable its own ship date — \"by EOQ\" let the sweep float all quarter. When we substitute a build, re-score it through the same gate so the portfolio decision is on paper, not in my head.\n- Carry into Q3? close — the audit's purpose (validate the build portfolio) is served; surviving builds carry as their own Q3 items.\n\n## Variable Pricing Full Rollout + Weekly Review Cadence — CRIT: yes\n- Color: SG (PROJ)\n- Results: Written Green (TUR Capacity tool + weekly pricing cadence) banked mid-quarter. SG bar substantially cleared: 7/13 dynamic-model build-out (155,920-row revenue spine, 10-branch PCM projections, ensemble bake-off) + 7/17 Q3 manager view live on hosted pages (per-branch monthly projections, FTE-budget/staffing block, TUR-at-plan, drill-downs, CSV export). Remaining by 7/31: fold personnel constraints into the model to tie in hiring budgets.\n- How we got here: The weekly cadence compounded — every pricing review forced the model to answer a question it couldn't yet, and that pressure built the revenue spine, the PCM projections, and finally a manager-facing surface. The brutal part: the personnel leg is late and sits on Rippling hours data that's been unreliable since the 6/29 punch-clock outage — we absorbed that as a caveat instead of escalating it as a blocker in June.\n- Went well: Cadence-driven development — ship the weekly review first and let it pull the tooling forward; publishing to hosted pages made manager adoption immediate. Playbook-worthy.\n- Differently / Q3 lesson: Escalate data-dependency risk the week it appears — the Rippling outage should have been a named blocker, not a footnote. Q3: personnel constraints + hiring budgets become first-class model inputs, and the long-term management skill gets locked so bottleneck-surfacing survives as a system, not a person.\n- Carry into Q3? carry — the model is the substrate for hiring-budget integration; weekly cadence continues as BAU.\n\n## AI Call Grading + Claims RAG (Wedge Build #1) — CRIT: no\n- Color: R (PROJ)\n- Results: 0 of 3 written-Green legs met: weekly 80%+ auto-grading not established (one report + ≥15-call spot-check only); Claims RAG not started (paused, subbed by Einstein Games under Goal 1); Nhel/Carly coaching loop not operational. ~50% complete.\n- How we got here: Capacity went to Einstein Games and Variable Pricing; RAG never got a start date, and grading never converted from a proven one-off into a weekly cadence.\n- Went well: The grading foundation is real — the report pipeline + spot-check discipline validated the approach cheaply before scaling it.\n- Differently / Q3 lesson: Don't let a validated wedge idle — the gap between \"first report worked\" and \"weekly cadence\" was scheduling, not tech. Q3: tie call audits directly into sales tracking, and evaluate weighted pipeline measurement by lead stage.\n- Carry into Q3? restructure — merges into the revamped sales dashboard so call grades land inside sales tracking rather than beside it.\n\n## ClearCo + Rippling API → Anne's Hiring Funnel Dashboard (Wedge Build #2) — CRIT: no\n- Color: G (PROJ)\n- Results: Dashboard live — HR Command Center productionized 7/6, refreshed through 7/20, owned by Linda + Anne. ClearCompany API hooked (Phase-1 read pipeline feeding the dashboard; manual refresh, which the written Green explicitly accepts). Rippling key now up and running (settings duplicable from mine) — remaining by 7/31: wire the Rippling leg into the Benefits/Hours tab. The ClearCo→Rippling new-hire webhook fired its first payload today at noon with errors (troubleshooting with their rep) — that sync continues into Q3 but sits outside the written Green definition. Caveat: 6/29 punch-clock outage still degrades hours-data quality.\n- How we got here: The half we controlled shipped well and early. The ClearCompany leg lagged for two honest reasons: our own bandwidth — it queued behind higher-priority builds before we could get things moving — and a vendor-side stall: ClearCompany's assigned technical rep wasn't actually working our project, and they've since replaced him. The brutal part: weeks passed before it was clear nobody on their side was working it, so the first webhook didn't fire until the final two weeks of the quarter. The Rippling key was never a real blocker — it turned out to be self-serviceable by duplicating settings on my own access.\n- Went well: The Phase-1 read-only pipeline + vendor webhook spec PDF gave the integration a paper trail the vendor rep is now debugging against; shipping the dashboard before the APIs kept value flowing to Anne's team all quarter; self-unblocking on the key beat waiting for a handoff.\n- Differently / Q3 lesson: Verify in week 1 that the vendor's assigned rep is actively working the project, and escalate for replacement at the first stall — silence isn't progress, and we lost weeks to it. Also: check whether a \"dependency\" is actually self-serviceable before parking it as a blocker (the Rippling key was). Q3: extend read-only Rippling querying to the roundtable CoS agents, with rate-limit guardrails baked in (the OT-hours over-query rejection is the cautionary tale).\n- Carry into Q3? carry — the SG remainder (self-serve cost-per-hire/time-to-fill/stage-% metrics, weekly auto-refresh) + the new-hire webhook sync carry as Q3 items.\n\n## Production Line Cleanup — 8 Loose Threads — CRIT: no\n- Color: SG (PROJ)\n- Results: 7 of 8 live or landing this week — Sales Review, Branch KPIs, Einstein Games, Scorecards live; Zip Zone Map live on EMMA (admin/map); Relocation Trend Map live on EMMA (admin/relocation-trend-map); Marketing Dashboard in final tweaks, ready by Wednesday's KickPoint sync. Teach/access rollout finalizing so the team self-serves all dashboards. Single SG gate by 7/31: Docs/Handbook — content is in the repo, needs a broken-link rewire + rollout.\n- How we got here: Dashboard-adjacent threads rode existing momentum (hosted-pages infra, refresh automation, the 7/18–7/19 weekend sprint). Zip Zone and Relocation Trends shipped inside EMMA admin rather than the vault, so the cleanup tracker undercounted them for weeks — the \"orphan thread\" problem was really a tracking-visibility problem, and it shrinks to just Docs/Handbook.\n- Went well: Batch-shipping through shared infra — each additional dashboard cost less than the last. Tightly-scoped weekend sprints work. Shipping map tools natively into EMMA admin put them where managers already live. var LS_KEY = 'qgrhq-q3-2026-v2-aar-review';
var state = load();
function load(){
  try { var s = JSON.parse(localStorage.getItem(LS_KEY)); if (s && s.leaders) return s; } catch(e){}
  var s = { leaders:{}, company:{ items:{}, note:'' } };
  DATA.leaders.forEach(function(l){ s.leaders[l.key] = blankLeader(); });
  return s;
}
function blankLeader(){ return { reviewed:false, verdict:null, verdictNote:'', note:'', goalNotes:{}, legend:{}, highlights:[] }; }
function L(key){ if (!state.leaders[key]) state.leaders[key] = blankLeader(); return state.leaders[key]; }
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); renderProgress(); renderStrip(); }
function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove('show');},1800); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

var cur = location.hash ? location.hash.slice(1) : DATA.leaders[0].key;
if (cur !== 'company' && !DATA.leaders.some(function(l){return l.key===cur;})) cur = DATA.leaders[0].key;

/* ---------- strip + progress ---------- */
function renderStrip(){
  var el = document.getElementById('leaderStrip');
  var html = DATA.leaders.map(function(l){
    var st = L(l.key);
    return '<button class="lchip '+(cur===l.key?'cur':'')+' '+(st.reviewed?'done':'')+'" onclick="go(\''+l.key+'\')">'+esc(l.short)+(st.reviewed?'<span class="tick">✓</span>':'')+'</button>';
  }).join('');
  html += '<button class="lchip '+(cur==='company'?'cur':'')+'" onclick="go(\'company\')">🏢 Company rollup</button>';
  html += '<div class="nav-arrows"><button class="btn" onclick="step(-1)">←</button><button class="btn" onclick="step(1)">→</button></div>';
  el.innerHTML = html;
}
function renderProgress(){
  var n = DATA.leaders.filter(function(l){ return L(l.key).reviewed; }).length;
  document.getElementById('progFill').style.width = (n/DATA.leaders.length*100)+'%';
  document.getElementById('progLbl').textContent = n+' of '+DATA.leaders.length+' leaders reviewed';
}
function go(key){ cur = key; location.hash = key; render(); window.scrollTo(0,0); }
function step(d){
  var keys = DATA.leaders.map(function(l){return l.key;}).concat(['company']);
  var i = keys.indexOf(cur);
  go(keys[(i+d+keys.length)%keys.length]);
}
document.addEventListener('keydown', function(e){
  if (e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
  if (e.key==='ArrowLeft') step(-1);
  if (e.key==='ArrowRight') step(1);
});

/* ---------- markdown-ish renderer ---------- */
function mdRender(md){
  var lines = md.split('\n'), out=[], inList=false;
  function closeList(){ if(inList){ out.push('</ul>'); inList=false; } }
  lines.forEach(function(raw){
    var line = raw.replace(/\s+$/,'');
    if (!line.trim()){ closeList(); return; }
    var m;
    if ((m = line.match(/^##\s+(.*)/))){
      closeList();
      var h = esc(m[1]);
      h = h.replace(/—\s*CRIT:\s*(yes|no)\*?$/i, function(_,c){ return c.toLowerCase()==='yes' ? '<span class="crit-tag">✦ CRITICAL NUMBER</span>' : ''; });
      out.push('<h3>'+h+'</h3>'); return;
    }
    if ((m = line.match(/^#\s+(.*)/))){ closeList(); return; } /* skip doc title; we render our own header */
    if ((m = line.match(/^[-*]\s+(.*)/))){
      if (!inList){ out.push('<ul>'); inList=true; }
      var li = esc(m[1]);
      li = li.replace(/^(Color|Results|How we got here|Went well|Differently \/ Q3 lesson|Differently|Carry into Q3\??|Q3 lesson)(:)/, '<b class="k">$1$2</b>');
      li = li.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
      out.push('<li>'+li+'</li>'); return;
    }
    closeList();
    var p = esc(line).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
    out.push('<p>'+p+'</p>');
  });
  closeList();
  return out.join('\n');
}

/* ---------- highlights ---------- */
function applyHighlights(html, hls){
  hls.forEach(function(h, idx){
    var needle = esc(h.text);
    var i = html.indexOf(needle);
    if (i === -1) return; /* selection crossed elements — still listed below */
    html = html.slice(0,i) + '<mark data-hl="'+idx+'" class="'+(h.note?'has-note':'')+'" title="'+esc(h.note||'click to note / remove')+'">' + needle + '</mark>' + html.slice(i+needle.length);
  });
  return html;
}
function bindSelection(container, key){
  container.addEventListener('mouseup', function(){
    setTimeout(function(){
      var sel = window.getSelection();
      var txt = sel ? sel.toString().trim() : '';
      var pop = document.getElementById('hlPop');
      if (!txt || txt.length < 3 || txt.length > 600){ pop.style.display='none'; return; }
      if (!container.contains(sel.anchorNode)) return;
      var r = sel.getRangeAt(0).getBoundingClientRect();
      pop.innerHTML = '<button id="hlAdd">🖍 Highlight</button><button id="hlAddNote">🖍+✎ w/ note</button>';
      pop.style.display = 'block';
      pop.style.left = (window.scrollX + r.left) + 'px';
      pop.style.top = (window.scrollY + r.top - 38) + 'px';
      document.getElementById('hlAdd').onclick = function(){ addHl(key, txt, ''); };
      document.getElementById('hlAddNote').onclick = function(){
        var n = prompt('Note for this highlight:'); if (n===null) return;
        addHl(key, txt, n);
      };
    }, 10);
  });
}
function addHl(key, txt, note){
  L(key).highlights.push({ text:txt, note:note||'' });
  document.getElementById('hlPop').style.display='none';
  window.getSelection().removeAllRanges();
  save(); render(); toast('Highlighted');
}
function hlClick(key, idx){
  var h = L(key).highlights[idx];
  var n = prompt('Note for this highlight (empty = keep, type REMOVE to delete):', h.note||'');
  if (n===null) return;
  if (n.trim().toUpperCase()==='REMOVE'){ L(key).highlights.splice(idx,1); }
  else h.note = n;
  save(); render();
}
function rmHl(key, idx){ L(key).highlights.splice(idx,1); save(); render(); }
document.addEventListener('mousedown', function(e){
  var pop = document.getElementById('hlPop');
  if (pop.style.display==='block' && !pop.contains(e.target)) pop.style.display='none';
});

function flipArrow(proj, self){

  if (rank[self] > rank[proj]) return '<span class="flip-arrow flip-up">↑</span>';
  if (rank[self] < rank[proj]) return '<span class="flip-arrow flip-down">↓</span>';
  return '<span class="flip-arrow flip-flat">→</span>';
}

    + '<div class="digest-card"><h5>✅ Wins</h5><ul>'+l.wins.map(function(w){return '<li>'+esc(w)+'</li>';}).join('')+'</ul></div>'
    + '<div class="digest-card"><h5>❌ Losses</h5><ul>'+l.losses.map(function(w){return '<li>'+esc(w)+'</li>';}).join('')+'</ul></div>'
    + '<div class="digest-card"><h5>📚 Lessons</h5><ul>'+l.lessons.map(function(w){return '<li>'+esc(w)+'</li>';}).join('')+'</ul></div>'
    + '<div class="digest-card opp"><h5>🎯 Biggest opportunity</h5><p>'+esc(l.biggest_opportunity)+'</p></div>'
    + (l.shoutout_candidates && l.shoutout_candidates.length ? '<div class="digest-card shout"><h5>📣 Shout-out candidates</h5><ul>'+l.shoutout_candidates.map(function(w){return '<li>'+esc(w)+'</li>';}).join('')+'</ul></div>' : '')
    + '</div></div>';

  /* review panel */
  h += '<div class="section"><div class="section-eyebrow">Your read</div><div class="section-title">Review & sign off</div><div class="review-panel">'
    + '<div style="font-size:0.82rem;font-weight:700;color:var(--navy)">Does this match your read on the QGR tracker / scorecard?</div>'
    + '<div class="verdict-row">'
    + '<button class="vbtn match '+(st.verdict==='match'?'on':'')+'" onclick="setVerdict(\''+l.key+'\',\'match\')">✓ Matches my read</button>'
    + '<button class="vbtn flag '+(st.verdict==='flag'?'on':'')+'" onclick="setVerdict(\''+l.key+'\',\'flag\')">⚠ Something\'s off</button>'
    + '</div>'
    + (st.verdict==='flag' ? '<textarea placeholder="What doesn\'t match?" onchange="setVerdictNote(\''+l.key+'\',this.value)">'+esc(st.verdictNote)+'</textarea>' : '')
    + '<textarea placeholder="Overall notes on '+esc(l.short)+'\'s quarter — anything for the QGR room, the legend, or the 1:1…" onchange="setNote(\''+l.key+'\',this.value)">'+esc(st.note)+'</textarea>'
    + '<button class="reviewed-btn '+(st.reviewed?'on':'')+'" onclick="togReviewed(\''+l.key+'\')">'+(st.reviewed?'✓ Reviewed — tap to reopen':'Mark '+esc(l.short)+' reviewed ✓')+'</button>'
    + '</div></div>';

  return h;
}
function togLegend(k,i){ var st=L(k); st.legend[i]=!st.legend[i]; if(!st.legend[i]) delete st.legend[i]; save(); render(); }
function togGoalNote(k,i){ var st=L(k); if (st.goalNotes[i]!==undefined){ if(!st.goalNotes[i]) delete st.goalNotes[i]; st._openNote=null; } else st.goalNotes[i]=''; st._openNote = (st.goalNotes[i]!==undefined)?i:null; save(); render(); }
function setGoalNote(k,i,v){ var st=L(k); if (v.trim()) st.goalNotes[i]=v; else delete st.goalNotes[i]; save(); }
function setVerdict(k,v){ var st=L(k); st.verdict = (st.verdict===v)?null:v; save(); render(); }
function setVerdictNote(k,v){ L(k).verdictNote=v; save(); }
function setNote(k,v){ L(k).note=v; save(); }
function togReviewed(k){ var st=L(k); st.reviewed=!st.reviewed; save(); render(); if(st.reviewed) toast('Marked reviewed — '+ (DATA.leaders.filter(function(l){return L(l.key).reviewed;}).length) +' of '+DATA.leaders.length); }

/* ---------- company view ---------- */
function coMark(id){ if (!state.company.items[id]) state.company.items[id] = { mark:null, note:'' }; return state.company.items[id]; }
function coItem(id, text){
  var m = coMark(id);
  return '<div class="co-item"><div class="body">'+text
    + (m.mark==='flag' || m.note ? '<div class="co-note"><textarea placeholder="Your ruling / note…" onchange="setCoNote(\''+id+'\',this.value)">'+esc(m.note)+'</textarea></div>' : '')
    + '</div><div class="marks">'
    + '<button class="mini-btn '+(m.mark==='agree'?'on':'')+'" onclick="setCoMark(\''+id+'\',\'agree\')">✓</button>'
    + '<button class="mini-btn '+(m.mark==='flag'?'note-on':'')+'" onclick="setCoMark(\''+id+'\',\'flag\')">⚠</button>'
    + '</div></div>';
}
function setCoMark(id,v){ var m=coMark(id); m.mark=(m.mark===v)?null:v; save(); render(); }
function setCoNote(id,v){ coMark(id).note=v; save(); }
function renderCompany(){
  var c = DATA.company;
  var t = c.tally_all_7;
  var h = '<div class="section"><div class="section-eyebrow">Company rollup</div><div class="section-title">Q2 2026 — all 7 leaders, self-graded</div>'
    + '<div class="section-desc">'+esc(t.note)+'</div>'
    + '<div class="co-stats">'
    + '<div class="co-stat"><div class="num">'+t.goals+'</div><div class="lbl">Goals</div></div>'
    + '<div class="co-stat"><div class="num" style="color:var(--teal)">'+t.SG+'</div><div class="lbl">Super Green</div></div>'
    + '<div class="co-stat"><div class="num" style="color:var(--green)">'+t.G+'</div><div class="lbl">Green</div></div>'
    + '<div class="co-stat"><div class="num" style="color:var(--red)">'+t.R+'</div><div class="lbl">Red</div></div>'
    + '<div class="co-stat"><div class="num">'+esc(t.success_rate.split('= ')[1])+'</div><div class="lbl">Success rate</div></div>'
    + '<div class="co-stat"><div class="num" style="color:var(--gray)">71%</div><div class="lbl">Q1 reconciled</div></div>'
    + '</div>'
    + '<div style="font-size:0.8rem;color:var(--gray)"><b>Honest flips:</b> '+esc(c.honest_flip_summary)+'</div>'
    + '</div>';

  h += '<div class="section"><div class="section-eyebrow">Trend check</div><div class="section-title">Cross-cutting lessons — agree ✓ or flag ⚠ each</div>'
    + c.cross_cutting_lessons.map(function(x,i){ return coItem('lesson'+i, esc(x)); }).join('') + '</div>';

  h += '<div class="section"><div class="section-eyebrow">Trend check</div><div class="section-title">Bottleneck + divergence flags</div>'
    + c.bottleneck_flags.map(function(x,i){ return coItem('flag'+i, esc(x)); }).join('') + '</div>';

  h += '<div class="section"><div class="section-eyebrow">Your read</div><div class="section-title">Company-level notes</div>'
    + '<div class="review-panel"><textarea placeholder="Anything about the overall quarter — theme ammo, patterns the tracker missed, Q3 implications…" onchange="state.company.note=this.value;save()">'+esc(state.company.note)+'</textarea></div></div>';
  return h;
}

/* ---------- export ---------- */
function exportMd(){
  var d = new Date();
  var md = '# Q2 2026 AAR Review — Cameron\'s rundown sheet\n*Exported '+d.toLocaleString()+' from the AAR Review Room. Hand this to Albert to fold in.*\n\n';
  var t = DATA.company.tally_all_7;
  md += '**Company:** '+t.goals+' goals · '+t.SG+' SG / '+t.G+' G / '+t.R+' R = '+t.success_rate+'\n\n';
  DATA.leaders.forEach(function(l){
    var st = L(l.key);
    md += '---\n\n## '+l.name+' — '+(st.reviewed?'✅ REVIEWED':'⬜ not yet reviewed')+'\n';
    if (st.verdict) md += '- **Tracker match:** '+(st.verdict==='match'?'✓ matches my read':'⚠ FLAGGED'+(st.verdictNote?' — '+st.verdictNote:''))+'\n';
    if (st.note) md += '- **Overall note:** '+st.note+'\n';
    var legends = Object.keys(st.legend);
    if (legends.length) md += '- **⭐ Legend-curation wins:** '+legends.map(function(i){return l.goals[i].goal;}).join(' · ')+'\n';
    Object.keys(st.goalNotes).forEach(function(i){
      if (st.goalNotes[i]) md += '- **Goal note — '+l.goals[i].goal+':** '+st.goalNotes[i]+'\n';
    });
    if (st.highlights.length){
      md += '- **Highlights:**\n';
      st.highlights.forEach(function(h){ md += '  - “'+h.text+'”'+(h.note?' — ✎ '+h.note:'')+'\n'; });
    }
    md += '\n';
  });
  md += '---\n\n## Company rollup\n';
  DATA.company.cross_cutting_lessons.forEach(function(x,i){
    var m = state.company.items['lesson'+i];
    if (m && (m.mark || m.note)) md += '- ['+(m.mark==='agree'?'✓':'⚠')+'] Lesson: '+x+(m.note?' — ✎ '+m.note:'')+'\n';
  });
  DATA.company.bottleneck_flags.forEach(function(x,i){
    var m = state.company.items['flag'+i];
    if (m && (m.mark || m.note)) md += '- ['+(m.mark==='agree'?'✓':'⚠')+'] Flag: '+x+(m.note?' — ✎ '+m.note:'')+'\n';
  });
  if (state.company.note) md += '\n**Company note:** '+state.company.note+'\n';
  download('aar-review-rundown-'+localDate(d)+'.md', md);
  if (navigator.clipboard) navigator.clipboard.writeText(md).then(function(){ toast('Exported + copied to clipboard'); }, function(){ toast('Exported'); });
  else toast('Exported');
}
function localDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function exportJson(){
  download('aar-review-state-'+localDate(new Date())+'.json', JSON.stringify(state, null, 2));
  toast('State exported');
}
function download(name, content){
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type:'text/plain'}));
  a.download = name; a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 500);
}
document.getElementById('exportMdBtn').onclick = exportMd;
document.getElementById('exportJsonBtn').onclick = exportJson;

/* ---------- render ---------- */
function render(){
  renderStrip(); renderProgress();
  var root = document.getElementById('viewRoot');
  if (cur === 'company'){ root.innerHTML = renderCompany(); return; }
  var l = DATA.leaders.filter(function(x){return x.key===cur;})[0];
  root.innerHTML = renderLeader(l);
  var body = document.getElementById('aarBody');
  if (body){
    bindSelection(body, l.key);
    body.querySelectorAll('mark').forEach(function(mk){
      mk.onclick = function(e){ e.stopPropagation(); hlClick(l.key, parseInt(mk.getAttribute('data-hl'),10)); };
    });
  }
}
render();
</script>
