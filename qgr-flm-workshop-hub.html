<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Einstein QGR Workshop — FLM / Regional Hub</title>
<!-- qgr-flm-workshop-hub v0.2 2026-07-24 — design-audit fixes: collapsible agenda/materials (collapsed by default), top progress summary, hub privacy band demoted to one line, live chip/summary updates without stealing textarea focus (Albert) -->

<!--
  HARD DATA RULE: this page carries ZERO quarterly metrics. No revenue,
  scores, grades, NOI, games numbers, damages dollars — nothing. Names
  and structure only. Any future number must come from the central
  manifest (QGR Packet/q2-data/branch-metrics-q2-26.json), never typed
  in here and never pulled from the roundtable packet.

  FLM WORKSHOP HUB — sibling surface of qgr-workshop-hub.html (the leader
  hub). Same brand tokens, same qgrhq-q3-2026-v2- localStorage prefix
  family, same export-and-return idiom (JSON download -> send to
  regional -> Cameron aggregates in qgr-flm-results.html). NOT a fork —
  copy drift back to the shell if the tokens ever diverge.

  DRAFT: session design is not locked. This page's agenda strip, tile
  set, and activities may change after the 7/29-30 leadership QGR. See
  the on-page DRAFT banner.

  Audience: frontline managers + ops managers, per region. No pre-seeded
  roster (seats are in flux, Rippling reconcile pending) — landing is a
  "who are you" free-text + role + branch capture, keyed by normalized
  name+branch so a person can close the tab and come back.

  Phone-first: this runs on phones in a room. Inputs are >=16px to avoid
  iOS auto-zoom; layouts tested at a 390px mental width.
-->
<style>
:root{
  --orange-50:#FEF6EC; --orange-100:#FDE3C2; --orange-200:#FABD84; --orange-500:#EF8B22; --orange-700:#D96B10; --orange-900:#CC5500;
  --navy-50:#EEF1F4; --navy-100:#CDD5DA; --navy-200:#9AADB7; --navy-400:#507080; --navy-500:#27343D; --navy-700:#1A2329; --navy-900:#0B1014;
  --blue-50:#EBF4FB; --blue-100:#C3DFEF; --blue-500:#0979C3; --blue-700:#065E9A; --blue-900:#023B63;
  --grey-50:#F4F5F5; --grey-100:#E2E3E4; --grey-200:#C0C2C4; --grey-400:#787C7F; --grey-500:#53575A; --grey-700:#363839; --grey-900:#191A1B;
  --success:#69995D; --error:#CC0100; --text-faint:#5F6468;
  --radius-sm:6px; --radius-md:12px; --radius-lg:20px; --radius-pill:999px;
  --shadow-sm:0 1px 2px rgba(39,52,61,.08); --shadow-md:0 4px 12px rgba(39,52,61,.10); --shadow-lg:0 12px 32px rgba(39,52,61,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:'Roboto',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:var(--grey-700);background:var(--grey-50);font-size:14px;line-height:1.5}
h1,h2,h3,h4{color:var(--navy-500);font-weight:700}
a{color:var(--blue-500)}
button{font:inherit;cursor:pointer}
input,textarea,select{font-size:16px}
::selection{background:var(--blue-100)}

#appHeader{background:var(--navy-500);color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50;box-shadow:var(--shadow-md)}
#appHeader .brand{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
#appHeader .brand .bebas{font-family:'Bebas Neue','Roboto',sans-serif;font-size:24px;letter-spacing:.03em;color:#fff}
#appHeader .brand .tag{font-size:11.5px;color:var(--navy-100)}
#appHeader .savebox{font-size:11px;color:var(--navy-100);text-align:right}
#appHeader .savebox b{color:#fff}
main{max-width:820px;margin:0 auto;padding:18px 16px 100px}
.view{display:none}
.view.active{display:block}
.muted{color:var(--text-faint)}
.small{font-size:12px}
.tiny{font-size:11px}

#storageWarn{display:none;background:#F8DCDC;color:#8E0000;border:1px solid #E6B2B2;border-radius:var(--radius-md);padding:12px 16px;font-size:12.5px;font-weight:700;margin-bottom:16px}
#storageWarn.show{display:block}

/* ---- DRAFT banner ---- */
.draft-banner{background:var(--orange-100);border:1px solid var(--orange-200);color:var(--orange-900);border-radius:var(--radius-md);padding:12px 16px;font-size:12.5px;font-weight:700;margin-bottom:16px;line-height:1.5}
.draft-banner b{text-transform:uppercase;letter-spacing:.04em}

/* ---- Landing: who are you ---- */
.landing-intro{background:#fff;border:1px solid var(--grey-100);border-radius:var(--radius-md);padding:20px;margin-bottom:16px}
.landing-intro h2{font-size:19px;margin-bottom:6px}
.landing-intro p{font-size:13px;color:var(--grey-500)}
.whoform{background:#fff;border:1px solid var(--grey-100);border-radius:var(--radius-md);padding:20px;margin-bottom:16px}
.whoform label{display:block;font-size:12.5px;font-weight:700;color:var(--navy-500);margin-bottom:5px;margin-top:14px}
.whoform label:first-of-type{margin-top:0}
.whoform input[type=text],.whoform select{width:100%;border:1px solid var(--grey-200);border-radius:var(--radius-sm);padding:11px 12px;font:inherit}
.rolegrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media (max-width:480px){.rolegrid{grid-template-columns:1fr}}
.role-btn{border:1.5px solid var(--grey-200);background:#fff;border-radius:var(--radius-sm);padding:11px 10px;font-size:13px;font-weight:700;color:var(--grey-500);text-align:center}
.role-btn.sel{background:var(--navy-500);border-color:var(--navy-500);color:#fff}
.whoform .go-btn{margin-top:18px;width:100%;background:var(--orange-500);color:#fff;border:none;border-radius:var(--radius-sm);padding:14px;font-size:14.5px;font-weight:700}
.whoform .go-btn:hover{background:var(--orange-700)}
.whoform .go-btn:disabled{background:var(--grey-200);cursor:not-allowed}
.recent-list{margin-top:6px}
.recent-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--grey-200);background:#fff;border-radius:var(--radius-pill);padding:7px 13px;font-size:12px;font-weight:700;color:var(--navy-500);margin:4px 6px 0 0}
.recent-chip .rc-started{color:var(--success);font-size:10px}

/* ---- Anti-anchoring / privacy band ---- */
.privacy-band{background:var(--blue-50);border:1px solid var(--blue-100);border-radius:var(--radius-md);padding:14px 16px;font-size:12.5px;color:var(--blue-900);margin-bottom:16px;display:flex;gap:10px;align-items:flex-start}
.privacy-band .pb-ico{font-size:16px;line-height:1.3}

/* ---- Hub head ---- */
.backlink{background:none;border:none;color:var(--blue-500);font-size:12.5px;font-weight:700;padding:0;margin-bottom:14px;display:inline-block}
.hub-head{background:#fff;border:1px solid var(--grey-100);border-radius:var(--radius-md);padding:16px 18px;margin-bottom:16px}
.hub-head h2{font-size:19px;margin:0}
.hub-head .sub{font-size:12px;color:var(--grey-400);margin-top:2px}

/* ---- Progress summary (top of hub) ---- */
.progress-summary{background:#fff;border:1px solid var(--grey-100);border-radius:var(--radius-md);padding:10px 16px;margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12.5px;font-weight:700;color:var(--navy-500)}
.progress-summary .prog-item{cursor:pointer;background:none;border:none;font:inherit;color:inherit;padding:2px 0}
.progress-summary .prog-item:hover{text-decoration:underline}
.progress-summary .prog-sep{color:var(--grey-200)}

/* ---- Privacy line (hub, compact) ---- */
.privacy-line{margin-bottom:16px}

/* ---- Collapsible block (agenda / materials) ---- */
.collapsible-block{padding:0}
.cblock-toggle{width:100%;background:#fff;border:none;border-radius:var(--radius-md);padding:16px 18px;font-size:13.5px;font-weight:700;color:var(--navy-500);display:flex;justify-content:space-between;align-items:center;text-align:left}
.collapsible-block.open .cblock-toggle{border-bottom:1px solid var(--grey-100);border-radius:var(--radius-md) var(--radius-md) 0 0}
.cblock-body{padding:14px 16px 18px}

/* ---- Agenda strip ---- */
.agenda-strip{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.agenda-item{background:#fff;border:1px solid var(--grey-100);border-radius:var(--radius-md);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px}
.agenda-item .ai-name{font-size:13px;font-weight:700;color:var(--navy-500)}
.agenda-item .ai-tool{font-size:11.5px;color:var(--grey-400);margin-top:2px}
.agenda-item .ai-time{font-size:11px;font-weight:700;color:#fff;background:var(--navy-400);border-radius:var(--radius-pill);padding:4px 11px;white-space:nowrap}
.agenda-item.here{border-color:var(--orange-200);background:var(--orange-50)}
.agenda-item.here .ai-time{background:var(--orange-500)}

/* ---- Tile grid ---- */
.tile-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:20px}
@media (min-width:640px){.tile-grid{grid-template-columns:1fr 1fr}}
.tile{background:#fff;border:1px solid var(--grey-100);border-radius:var(--radius-md);padding:15px 16px;box-shadow:var(--shadow-sm)}
.tile h4{font-size:13.5px;display:flex;align-items:center;gap:7px;margin-bottom:5px}
.tile p{font-size:11.5px;color:var(--grey-400);line-height:1.5}
.tile .tlink{font-size:11.5px;font-weight:700;display:inline-block;margin-top:7px}
.tile.live{border-color:var(--orange-200)}
.tile .now{font-size:9.5px;font-weight:700;background:var(--orange-100);color:var(--orange-900);border-radius:var(--radius-pill);padding:1px 8px;text-transform:uppercase;letter-spacing:.04em}
.tile.soft{border-style:dashed;background:var(--grey-50)}

/* ---- Section shell ---- */
.section{background:#fff;border:1px solid var(--grey-100);border-radius:var(--radius-md);padding:18px 16px;margin-bottom:16px}
.section > .shead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:10px;flex-wrap:wrap}
.section h3{font-size:15.5px;display:flex;align-items:center;gap:8px}
.section .shelp{font-size:12.5px;color:var(--grey-400);margin-bottom:14px;line-height:1.55}
.section .done-chip{font-size:10.5px;color:var(--success);font-weight:700}

/* ---- Flywheel component cards ---- */
.wheel-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.wheel-card{border:1.5px solid var(--grey-200);border-radius:var(--radius-md);padding:12px 14px;font-size:13px;font-weight:700;color:var(--navy-500);display:flex;align-items:center;gap:10px;background:#fff}
.wheel-card .wc-num{font-size:11px;font-weight:700;color:#fff;background:var(--navy-400);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0}

.chiprow{display:flex;gap:6px;align-items:stretch;flex-wrap:wrap;margin-bottom:10px}
.chip{border:1.5px solid var(--grey-200);background:#fff;border-radius:var(--radius-sm);padding:10px 14px;font-size:12.5px;font-weight:700;color:var(--grey-500);text-align:center;min-height:44px}
.chip:hover{border-color:var(--navy-400)}
.chip.sel{background:var(--navy-500);border-color:var(--navy-500);color:#fff}
.chip.sel.good{background:var(--success);border-color:var(--success)}
.chip.sel.warn{background:var(--orange-700);border-color:var(--orange-700)}

.q-block{margin-top:14px}
.q-block label{display:block;font-size:12.5px;font-weight:700;color:var(--navy-500);margin-bottom:5px}
.q-block label .qhint{font-weight:400;color:var(--grey-400)}
.q-block textarea{width:100%;border:1px solid var(--grey-200);border-radius:var(--radius-sm);padding:10px 12px;font:inherit;resize:vertical;min-height:72px}
.q-block textarea.note-missing{border-color:var(--orange-500);background:var(--orange-50)}

/* ---- 100-point allocator ---- */
.alloc-wrap{border:1px solid var(--grey-100);border-radius:var(--radius-md);padding:14px;margin-top:6px;margin-bottom:6px;background:var(--grey-50)}
.alloc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.alloc-remaining{font-size:13px;font-weight:700;padding:5px 12px;border-radius:var(--radius-pill);background:var(--grey-100);color:var(--grey-500)}
.alloc-remaining.zero{background:#E3EEDF;color:#3E6636}
.alloc-remaining.over{background:#F8DCDC;color:#8E0000}
.alloc-reset{background:#fff;border:1px solid var(--grey-200);border-radius:var(--radius-sm);padding:7px 12px;font-size:11.5px;font-weight:700;color:var(--navy-500)}
.alloc-reset:hover{border-color:var(--navy-400)}
.alloc-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--grey-100)}
.alloc-row:first-of-type{border-top:none}
.alloc-row .ar-label{flex:1;font-size:12.5px;font-weight:700;color:var(--navy-500)}
.alloc-row input[type=number]{width:64px;border:1px solid var(--grey-200);border-radius:var(--radius-sm);padding:9px 8px;font:inherit;text-align:center}
.alloc-row .ar-bar-track{flex:1;height:8px;background:var(--grey-100);border-radius:4px;overflow:hidden;min-width:60px}
.alloc-row .ar-bar-fill{height:100%;background:var(--blue-500)}
@media (max-width:480px){.alloc-row{flex-wrap:wrap}.alloc-row .ar-bar-track{order:3;flex-basis:100%}}

.gwc-note{font-size:11.5px;color:var(--grey-400);background:var(--navy-50);border-radius:var(--radius-sm);padding:9px 12px;margin:8px 0 12px;line-height:1.5}

/* ---- soft/dashed OPSP tile note ---- */
.soft-note{font-size:11px;color:var(--grey-400);font-style:italic}

/* ---- export ---- */
.export-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
.export-actions button{background:var(--navy-500);color:#fff;border:none;border-radius:var(--radius-sm);padding:13px 20px;font-size:13px;font-weight:700;flex:1;min-width:150px}
.export-actions button:hover{background:var(--navy-700)}
.export-actions button.secondary{background:#fff;color:var(--navy-500);border:1px solid var(--grey-200)}
.export-actions button.secondary:hover{border-color:var(--navy-400)}
textarea.mdpreview{width:100%;min-height:140px;margin-top:12px;border:1px solid var(--grey-200);border-radius:var(--radius-sm);padding:10px;font-family:monospace;font-size:11px;resize:vertical;display:none}
textarea.mdpreview.show{display:block}
.export-status{font-size:12px;font-weight:700;margin-bottom:10px;padding:8px 12px;border-radius:var(--radius-sm)}
.export-status.ok{background:#E3EEDF;color:#3E6636}
.export-status.incomplete{background:var(--orange-100);color:var(--orange-900)}

footer{background:var(--navy-700);color:var(--navy-100);text-align:center;padding:12px;font-size:10.5px;position:fixed;bottom:0;left:0;right:0;z-index:40}
.toast{position:fixed;bottom:52px;left:16px;right:16px;background:var(--navy-500);color:#fff;padding:10px 18px;border-radius:var(--radius-sm);font-size:12.5px;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(6px);transition:.25s;z-index:300;pointer-events:none;text-align:center}
.toast.show{opacity:1;transform:translateY(0)}
@media (min-width:640px){.toast{left:auto;right:24px;max-width:360px}}
@media (max-width:640px){
  #appHeader .savebox{display:none}
}
</style>
</head>
<body>
<header id="appHeader">
  <div class="brand"><span class="bebas">EINSTEIN QGR WORKSHOP</span><span class="tag">FLM / Regional Hub · Q3 2026</span></div>
  <div class="savebox" id="saveBox">Local only — nothing leaves this phone until you export<br><b id="saveStamp">—</b></div>
</header>
<main>
  <div id="storageWarn"></div>
  <section class="view active" id="view-landing"></section>
  <section class="view" id="view-hub"></section>
</main>
<footer>Internal tool · your answers stay on this device until YOU export and send them to your regional · Einstein Moving Company</footer>
<div class="toast" id="toast"></div>

<script>
/* ============ Constants ============ */
const LS_KEY = "qgrhq-q3-2026-v2-flm-workshop";
const QUARTER = "Q3 2026 FLM/Regional QGR";

// SOURCE: branch roster as named in q2-data/branch-metrics-q2-26.json (the central manifest).
// Do NOT add numbers from anywhere else on this page.
// Display names use the sitewide abbreviation convention (N. Austin / Ft. Worth …) — intentional, matches scorecards;
// identity in the manifest is the snake_case key, never this display string.
const BRANCHES = ["N. Austin","S. Austin","Leander","San Antonio","Houston","Dallas","Ft. Worth","Garland","McKinney","Tampa"];

const ROLES = ["Branch Manager","Ops Manager","Field Manager","Other"];

const AGENDA = [
  { time:"30m", name:"Ground", tool:"Who-We-Are + OPSP write-out — paper exercise, run in the room" },
  { time:"60m", name:"Look Back", tool:"Frontline packet, present mode" },
  { time:"45m", name:"Your Branch", tool:"Branch scorecards" },
  { time:"60m", name:"Flywheel", tool:"Teach + this page's Activity 1", here:true },
  { time:"60m", name:"Build With Us", tool:"This page's Activity 2", here:true },
  { time:"45m", name:"Look Forward", tool:"Q3 theme card — fills after QGR" },
  { time:"20m", name:"Close", tool:"One takeaway" }
];

// The six main-wheel components — exact names + order, mirrors the live Flywheel page.
const WHEEL = [
  "Attract & Develop Great Movers",
  "Deliver the Smart Move Experience",
  "Earn Trust at Scale",
  "Win Demand",
  "Optimize Capacity",
  "Reinvest Profit in People and Innovation"
];
const ENGINES = ["The People Engine","The Capacity Engine","The Demand Engine","No preference"];

// Same 7 CHOICES values as the leader hub / mgr-AAR tool (CORE_VALUES).
const CORE_VALUES = [
  "Communicate clearly and with kindness",
  "Hustle but don't rush",
  "Ownership over results",
  "Improve with Enthusiasm",
  "Conscientious attention to detail",
  "Elevate attitudes",
  "Support Generously"
];
const HHS = ["Humble","Hungry","Smart"];
const GWC_OPTIONS = [
  {v:"yes", label:"Yes"},
  {v:"mostly", label:"Mostly"},
  {v:"no", label:"No"}
];

/* ============ State ============ */
let STATE = { participants:{}, lastSaved:null };
let currentKey = null;
let saveTimer = null;

function loadState(){
  try{ const raw = localStorage.getItem(LS_KEY); if(raw) STATE = Object.assign(STATE, JSON.parse(raw)); }catch(e){ console.warn("state load failed", e); }
  if(!STATE.participants) STATE.participants = {};
}
function queueSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>{
    STATE.lastSaved = new Date().toISOString();
    try{
      localStorage.setItem(LS_KEY, JSON.stringify(STATE));
      renderSaveStamp();
    }catch(e){
      const w = document.getElementById("storageWarn");
      w.textContent = "⚠ NOT SAVING — this browser is blocking local storage. Don't close this tab. Export your answers from the bottom section now and keep the file.";
      w.classList.add("show");
      document.getElementById("saveStamp").textContent = "NOT SAVING";
    }
  }, 250);
}
function renderSaveStamp(){
  const el = document.getElementById("saveStamp");
  if(!el) return;
  el.textContent = STATE.lastSaved ? "Saved " + new Date(STATE.lastSaved).toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) : "—";
}
function normKey(name, branch){
  return (name||"").trim().toLowerCase().replace(/\s+/g," ") + "|" + (branch||"").trim().toLowerCase();
}
function emptyParticipant(name, role, branch){
  return {
    name: name, role: role, branch: branch,
    flywheel: { strongest:null, leak:null, oneThing:"", engine:null },
    pa: {
      valuePoints: {},   // core value -> integer points, sum should be 100
      hhs: {},           // Humble/Hungry/Smart -> integer points, sum should be 100
      promoteVsKeep: "", keepYourJobLine: "", gwc: null
    },
    ui: { agendaOpen:false, tilesOpen:false },
    startedAt: null
  };
}
function getParticipant(){
  if(!STATE.participants[currentKey]) return null;
  const p = STATE.participants[currentKey];
  if(!p.flywheel) p.flywheel = { strongest:null, leak:null, oneThing:"", engine:null };
  if(!p.pa) p.pa = { valuePoints:{}, hhs:{}, promoteVsKeep:"", keepYourJobLine:"", gwc:null };
  if(!p.pa.valuePoints) p.pa.valuePoints = {};
  if(!p.pa.hhs) p.pa.hhs = {};
  if(!p.ui) p.ui = { agendaOpen:false, tilesOpen:false };
  return p;
}
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2600);
}
function allocSum(obj, keys){
  return keys.reduce((sum,k)=> sum + (Number(obj[k])||0), 0);
}

/* ============ Landing ============ */
let selectedRole = null;

function renderLanding(){
  selectedRole = null;
  const wrap = document.getElementById("view-landing");
  let html = draftBannerHtml();
  html += '<div class="landing-intro"><h2>FLM / Regional QGR Workshop</h2>'+
    '<p>This page runs the two live activities in the room: the flywheel placement and the Mover People Analyzer build-with-us. Everything saves automatically on this device; nothing is shared until you export and hand it to your regional.</p></div>';
  html += privacyBandHtml();
  html += '<div class="whoform"><label>Your name</label><input type="text" id="wfName" placeholder="First and last name">'+
    '<label>Your role</label><div class="rolegrid" id="wfRoleGrid">'+
    ROLES.map(r=>'<button type="button" class="role-btn" data-role="'+esc(r)+'">'+esc(r)+'</button>').join("")+
    '</div>'+
    '<label>Your branch</label><select id="wfBranch"><option value="">Select your branch…</option>'+
    BRANCHES.map(b=>'<option value="'+esc(b)+'">'+esc(b)+'</option>').join("")+
    '</select>'+
    '<button class="go-btn" id="wfGo" disabled>Start the workshop</button>'+
    '</div>';

  const recents = Object.values(STATE.participants).filter(p=>p.startedAt).sort((a,b)=> (b.startedAt||"").localeCompare(a.startedAt||""));
  if(recents.length){
    html += '<div class="small muted" style="margin-bottom:6px">Started on this device before:</div><div class="recent-list">';
    recents.forEach(p=>{
      html += '<button type="button" class="recent-chip" data-resume="'+esc(normKey(p.name,p.branch))+'">'+esc(p.name)+' · '+esc(p.branch)+' <span class="rc-started">continue</span></button>';
    });
    html += '</div>';
  }
  wrap.innerHTML = html;
  wireLanding();
}

function draftBannerHtml(){
  return '<div class="draft-banner"><b>Draft</b> — session design not locked. Cameron reacts to the agenda when fresh; blocks may change after the 7/29&ndash;30 leadership QGR.</div>';
}
function privacyBandHtml(){
  return '<div class="privacy-band"><span class="pb-ico">🔒</span><div><b>Your answers are yours alone until the room.</b> Nothing leaves this device until you export &mdash; nobody sees your picks or your notes before then. Give your own honest read; the group view comes together after everyone exports.</div></div>';
}

function wireLanding(){
  const nameEl = document.getElementById("wfName");
  const branchEl = document.getElementById("wfBranch");
  const goBtn = document.getElementById("wfGo");
  function refreshGo(){
    goBtn.disabled = !(nameEl.value.trim() && selectedRole && branchEl.value);
  }
  nameEl.addEventListener("input", refreshGo);
  branchEl.addEventListener("change", refreshGo);
  document.querySelectorAll("#wfRoleGrid [data-role]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      selectedRole = btn.dataset.role;
      document.querySelectorAll("#wfRoleGrid [data-role]").forEach(b=>b.classList.toggle("sel", b===btn));
      refreshGo();
    });
  });
  goBtn.addEventListener("click", ()=>{
    const name = nameEl.value.trim(), branch = branchEl.value, role = selectedRole;
    if(!name || !role || !branch) return;
    const key = normKey(name, branch);
    if(!STATE.participants[key]) STATE.participants[key] = emptyParticipant(name, role, branch);
    else { STATE.participants[key].role = role; } // role can be re-confirmed on resume
    openParticipant(key);
  });
  document.querySelectorAll("[data-resume]").forEach(btn=>{
    btn.addEventListener("click", ()=> openParticipant(btn.dataset.resume));
  });
}

/* ============ Hub ============ */
function openParticipant(key){
  currentKey = key;
  const p = getParticipant();
  if(!p.startedAt){ p.startedAt = new Date().toISOString(); queueSave(); }
  document.getElementById("view-landing").classList.remove("active");
  document.getElementById("view-hub").classList.add("active");
  renderHub();
  window.scrollTo(0,0);
}
function backToLanding(){
  currentKey = null;
  document.getElementById("view-hub").classList.remove("active");
  document.getElementById("view-landing").classList.add("active");
  renderLanding();
  window.scrollTo(0,0);
}

function renderHub(){
  const p = getParticipant();
  const wrap = document.getElementById("view-hub");
  const keepY = window.scrollY;

  let html = '<button class="backlink" id="backBtn">&larr; Not you? Switch</button>';
  html += draftBannerHtml();
  html += '<div class="hub-head"><h2>'+esc(p.name)+'</h2><div class="sub">'+esc(p.role)+' · '+esc(p.branch)+' · '+esc(QUARTER)+'</div></div>';
  html += progressSummaryHtml(p);
  html += privacyLineHtml();
  html += agendaStripHtml(p);
  html += tilesHtml(p);
  html += activity1Html(p);
  html += activity2Html(p);
  html += exportSectionHtml(p);
  wrap.innerHTML = html;
  wireHub(p);
  window.scrollTo(0, keepY);
}

    '<div class="shelp">You just saw the flywheel. Now tell us where it\'s really spinning &mdash; and where it\'s leaking.</div>'+
    '<div class="wheel-grid">';
  WHEEL.forEach((w,i)=>{ html += '<div class="wheel-card"><span class="wc-num">'+(i+1)+'</span>'+esc(w)+'</div>'; });
  html += '</div>';

  html += '<div class="q-block"><label>Strongest right now <span class="qhint">— pick one</span></label><div class="chiprow">'+
    WHEEL.map(w=>'<button class="chip'+(fw.strongest===w?' sel good':'')+'" data-fw="strongest" data-val="'+esc(w)+'">'+esc(w)+'</button>').join("")+'</div></div>';

  html += '<div class="q-block"><label>Biggest leak / biggest opportunity <span class="qhint">— pick one</span></label><div class="chiprow">'+
    WHEEL.map(w=>'<button class="chip'+(fw.leak===w?' sel warn':'')+'" data-fw="leak" data-val="'+esc(w)+'">'+esc(w)+'</button>').join("")+'</div></div>';

  html += '<div class="q-block"><label>At YOUR branch, the one thing that would spin the wheel faster</label>'+
    '<textarea data-fwtext="oneThing" class="'+(!(fw.oneThing||"").trim()?"note-missing":"")+'" placeholder="Specific beats general — one real thing you\'d change or add.">'+esc(fw.oneThing||"")+'</textarea></div>';

/* ---- Activity 2: Build the Mover People Analyzer ---- */
function activity2Html(p){
  const pa = p.pa;
  const cvSum = allocSum(pa.valuePoints, CORE_VALUES);
  const hhsSum = allocSum(pa.hhs, HHS);
  const complete = cvSum===100 && hhsSum===100 && (pa.promoteVsKeep||"").trim() && (pa.keepYourJobLine||"").trim() && pa.gwc;
  let html = '<div class="section" id="sec-activity2"><div class="shead"><h3>🛠 Activity 2 — Build the Mover People Analyzer with us</h3>'+
    '<span class="done-chip" id="a2DoneChip" style="'+(complete?'':'display:none')+'">✓ complete</span></div>'+
    '<div class="shelp">We\'re rebuilding how movers get evaluated and promoted. Before we lock it, we want your read &mdash; you see the floor every day.</div>';

  html += allocatorHtml("valuePoints", "Value weighting", "Allocate 100 points across the seven CHOICES values &mdash; put the most points where it matters most for a mover.", CORE_VALUES, pa.valuePoints, cvSum);
  html += allocatorHtml("hhs", "Humble / Hungry / Smart", "Same idea, across the three Ideal Team Player traits.", HHS, pa.hhs, hhsSum);

  html += '<div class="q-block"><label>What separates a mover you\'d PROMOTE from a mover you\'d merely keep?</label>'+
    '<textarea data-patext="promoteVsKeep" placeholder="Think of two real movers you know — what\'s the actual difference?">'+esc(pa.promoteVsKeep||"")+'</textarea></div>';

  html += '<div class="q-block"><label>What should be a keep-your-job line, but NOT a promotion factor?</label>'+
    '<div class="gwc-note">Leadership\'s current lean is that damages sit here &mdash; branch cost of doing business, never a promotion factor. React to that, don\'t just agree.</div>'+
    '<textarea data-patext="keepYourJobLine" placeholder="What\'s the line — and do you agree damages belong here?">'+esc(pa.keepYourJobLine||"")+'</textarea></div>';

  html += '<div class="q-block"><label>Do your movers know what\'s expected of them day one?</label><div class="chiprow">'+
    GWC_OPTIONS.map(o=>'<button class="chip'+(pa.gwc===o.v?' sel':'')+'" data-gwc="'+esc(o.v)+'">'+esc(o.label)+'</button>').join("")+'</div></div>';

  html += '</div>';
  return html;
}

function allocatorHtml(field, title, help, items, obj, sum){
  const remaining = 100 - sum;
  const cls = remaining===0 ? "zero" : (remaining<0 ? "over" : "");
  let html = '<div class="q-block"><label>'+esc(title)+'</label><div class="small muted" style="margin-bottom:6px">'+esc(help)+'</div>'+
    '<div class="alloc-wrap" data-allocfield="'+esc(field)+'">'+
    '<div class="alloc-head"><span class="alloc-remaining '+cls+'" data-allocremaining="'+esc(field)+'">'+
    (remaining===0 ? "All 100 allocated" : (remaining>0 ? remaining+" points left" : (remaining*-1)+" over 100")) +
    '</span><button type="button" class="alloc-reset" data-allocreset="'+esc(field)+'">Spread evenly</button></div>';
  items.forEach(item=>{
    const val = Number(obj[item])||0;
    html += '<div class="alloc-row"><span class="ar-label">'+esc(item)+'</span>'+
      '<div class="ar-bar-track"><div class="ar-bar-fill" style="width:'+Math.min(100,val)+'%"></div></div>'+
      '<input type="number" min="0" max="100" step="1" data-allocinput="'+esc(field)+'" data-allockey="'+esc(item)+'" value="'+val+'">'+
      '</div>';
  });
  html += '</div></div>';
  return html;
}

/* ---- Export ---- */
function exportSectionHtml(p){
  const missing = exportMissingList(p);
  const statusHtml = missing.length
    ? '<div class="export-status incomplete">Not complete yet — '+missing.length+' item'+(missing.length>1?"s":"")+' still open: '+esc(missing.join("; "))+'</div>'
    : '<div class="export-status ok">✓ Everything\'s filled in — ready to export.</div>';
  return '<div class="section" id="sec-export"><div class="shead"><h3>📤 Send it in</h3></div>'+
    statusHtml+
    '<div class="shelp">Download the file and send it to your regional &mdash; they collect everyone\'s and it comes back to Cameron. You can still export early and finish later; just re-download when you\'re done.</div>'+
    '<div class="export-actions">'+
      '<button id="btnJson">Download JSON → send to your regional</button>'+
      '<button id="btnMd" class="secondary">Copy plain-text version</button>'+
      '<button id="btnMdPreview" class="secondary">Preview</button>'+
    '</div><textarea class="mdpreview" id="mdPreview" readonly></textarea></div>';
}
// Shared status logic — activity1Missing/activity2Missing are the single source of
// truth for both the export-status block and the top progress summary / section chips.
// Never duplicate this list-building elsewhere; call these two functions instead.
function activity1Missing(p){
  const missing = [];
  const fw = p.flywheel;
  if(!fw.strongest) missing.push("flywheel: strongest");
  if(!fw.leak) missing.push("flywheel: biggest leak");
  if(!(fw.oneThing||"").trim()) missing.push("flywheel: the one thing");
  return missing;
}
function activity2Missing(p){
  const missing = [];
  const pa = p.pa;
  if(allocSum(pa.valuePoints, CORE_VALUES)!==100) missing.push("value weighting (must total 100)");
  if(allocSum(pa.hhs, HHS)!==100) missing.push("Humble/Hungry/Smart (must total 100)");
  if(!(pa.promoteVsKeep||"").trim()) missing.push("promote vs. keep");
  if(!(pa.keepYourJobLine||"").trim()) missing.push("keep-your-job line");
  if(!pa.gwc) missing.push("day-one clarity gut-check");
  return missing;
}
function exportMissingList(p){
  return activity1Missing(p).concat(activity2Missing(p));
}

/* ============ Wiring ============ */
function wireHub(p){
  const wrap = document.getElementById("view-hub");
  document.getElementById("backBtn").addEventListener("click", backToLanding);

  wrap.querySelectorAll("[data-scrollto]").forEach(a=>{
    a.addEventListener("click", (e)=>{
      e.preventDefault();
      const el = document.getElementById(a.dataset.scrollto);
      if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
    });
  });

  wrap.querySelectorAll("[data-cblock]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const which = btn.dataset.cblock;
      if(which==="agenda") p.ui.agendaOpen = !p.ui.agendaOpen;
      if(which==="tiles") p.ui.tilesOpen = !p.ui.tilesOpen;
      queueSave(); renderHub();
    });
  });

  wrap.querySelectorAll("[data-fw]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const field = btn.dataset.fw, val = btn.dataset.val;
      p.flywheel[field] = p.flywheel[field]===val ? null : val;
      queueSave(); renderHub();
    });
  });
  wrap.querySelectorAll("[data-fwtext]").forEach(ta=>{
    ta.addEventListener("input", ()=>{
      p.flywheel[ta.dataset.fwtext] = ta.value;
      queueSave();
      refreshExportStatus(p);
    });
  });

  wrap.querySelectorAll("[data-patext]").forEach(ta=>{
    ta.addEventListener("input", ()=>{
      p.pa[ta.dataset.patext] = ta.value;
      queueSave();
      refreshExportStatus(p);
    });
  });
  wrap.querySelectorAll("[data-gwc]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      p.pa.gwc = p.pa.gwc===btn.dataset.gwc ? null : btn.dataset.gwc;
      queueSave(); renderHub();
    });
  });

  wrap.querySelectorAll("[data-allocinput]").forEach(inp=>{
    inp.addEventListener("input", ()=>{
      const field = inp.dataset.allocinput, key = inp.dataset.allockey;
      let v = Math.round(Number(inp.value));
      if(isNaN(v) || v<0) v = 0;
      if(v>100) v = 100;
      p.pa[field][key] = v;
      queueSave();
      renderAllocator(field, field==="valuePoints"?CORE_VALUES:HHS, p.pa[field]);
      refreshExportStatus(p);
    });
  });
  wrap.querySelectorAll("[data-allocreset]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const field = btn.dataset.allocreset;
      const items = field==="valuePoints" ? CORE_VALUES : HHS;
      const base = Math.floor(100/items.length);
      let remainder = 100 - base*items.length;
      items.forEach(item=>{
        p.pa[field][item] = base + (remainder>0 ? 1 : 0);
        if(remainder>0) remainder--;
      });
      queueSave();
      renderHub();
      toast("Spread evenly across "+items.length+".");
    });
  });

  document.getElementById("btnJson").addEventListener("click", ()=>{
    const missing = exportMissingList(p);
    downloadFile(fileNameFor(p), JSON.stringify(buildJson(p), null, 2), "application/json");
    toast(missing.length ? "Downloaded — heads up, "+missing.length+" item"+(missing.length>1?"s":"")+" still open" : "Downloaded — send the file to your regional");
  });
  document.getElementById("btnMd").addEventListener("click", ()=>{
    const md = buildMarkdown(p);
    const pv = document.getElementById("mdPreview");
    pv.value = md; pv.classList.add("show");
    copyText(md, "Copied");
  });
  document.getElementById("btnMdPreview").addEventListener("click", ()=>{
    const pv = document.getElementById("mdPreview");
    pv.value = buildMarkdown(p); pv.classList.toggle("show");
  });
}

function renderAllocator(field, items, obj){
  const wrap = document.querySelector('[data-allocfield="'+field+'"]');
  if(!wrap) return;
  const sum = allocSum(obj, items);
  const remaining = 100 - sum;
  const remEl = wrap.querySelector('[data-allocremaining="'+field+'"]');
  remEl.className = "alloc-remaining " + (remaining===0 ? "zero" : (remaining<0 ? "over" : ""));
  remEl.textContent = remaining===0 ? "All 100 allocated" : (remaining>0 ? remaining+" points left" : (remaining*-1)+" over 100");
  wrap.querySelectorAll(".alloc-row").forEach((row,i)=>{
    const item = items[i];
    const val = Number(obj[item])||0;
    row.querySelector(".ar-bar-fill").style.width = Math.min(100,val)+"%";
  });
}
function refreshExportStatus(p){
  // Targeted DOM updates only — this runs on every textarea keystroke (data-fwtext /
  // data-patext), so it must never call renderHub() or it will steal focus mid-type.
  const el = document.querySelector("#sec-export .export-status");
  if(el){
    const missing = exportMissingList(p);
    el.className = "export-status " + (missing.length ? "incomplete" : "ok");
    el.textContent = missing.length
      ? "Not complete yet — "+missing.length+" item"+(missing.length>1?"s":"")+" still open: "+missing.join("; ")
      : "✓ Everything's filled in — ready to export.";
  }

  const a1miss = activity1Missing(p), a2miss = activity2Missing(p);

  const a1Chip = document.getElementById("a1DoneChip");
  if(a1Chip) a1Chip.style.display = a1miss.length ? "none" : "";
  const a2Chip = document.getElementById("a2DoneChip");
  if(a2Chip) a2Chip.style.display = a2miss.length ? "none" : "";

  const a1Text = document.getElementById("progA1Text");
  if(a1Text) a1Text.textContent = a1miss.length ? a1miss.length+" open" : "✓ done";
  const a2Text = document.getElementById("progA2Text");
  if(a2Text) a2Text.textContent = a2miss.length ? a2miss.length+" open" : "✓ done";
}

function copyText(text, okMsg){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>toast(okMsg), ()=>toast("Copy blocked — select it from the preview below"));
  } else {
    const pv = document.getElementById("mdPreview");
    if(pv){ pv.value = text; pv.classList.add("show"); }
    toast("Copy not available in this browser — select it from the preview below");
  }
}

/* ============ Export builders ============ */
function fileNameFor(p){
  const safe = (p.name||"participant").trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
  const b = (p.branch||"").trim().toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"");
  return "flm-"+safe+"-"+b+"-q3-2026.json";
}
function buildJson(p){
  return {
    schema: "einstein-flm-workshop/v1",
    quarter: QUARTER,
    participant: { name: p.name, role: p.role, branch: p.branch },
    flywheel: {
      strongest: p.flywheel.strongest || null,
      leak: p.flywheel.leak || null,
      oneThing: (p.flywheel.oneThing||"").trim(),
      engine: p.flywheel.engine || null
    },
    pa: {
      valuePoints: Object.assign({}, ...CORE_VALUES.map(cv=>({[cv]: Number(p.pa.valuePoints[cv])||0}))),
      hhs: Object.assign({}, ...HHS.map(h=>({[h]: Number(p.pa.hhs[h])||0}))),
      promoteVsKeep: (p.pa.promoteVsKeep||"").trim(),
      keepYourJobLine: (p.pa.keepYourJobLine||"").trim(),
      gwc: p.pa.gwc || null
    },
    startedAt: p.startedAt || null,
    exportedAt: new Date().toISOString()
  };
}
function buildMarkdown(p){
  const d = new Date().toISOString().slice(0,10);
  let md = "# FLM Workshop — "+p.name+" — "+d+"\n*"+p.role+" · "+p.branch+" · "+QUARTER+"*\n\n";
  md += "## Activity 1 — Flywheel placement\n";
  md += "- Strongest right now: "+(p.flywheel.strongest||"—")+"\n";
  md += "- Biggest leak / opportunity: "+(p.flywheel.leak||"—")+"\n";
  md += "- One thing that would spin it faster: "+((p.flywheel.oneThing||"").trim()||"—")+"\n";
  md += "- Engine to go deeper on: "+(p.flywheel.engine||"—")+"\n\n";
  md += "## Activity 2 — Build the Mover People Analyzer\n";
  md += "### Value weighting (of 100)\n";
  CORE_VALUES.forEach(cv=>{ md += "- "+cv+": "+(Number(p.pa.valuePoints[cv])||0)+"\n"; });
  md += "### Humble / Hungry / Smart (of 100)\n";
  HHS.forEach(h=>{ md += "- "+h+": "+(Number(p.pa.hhs[h])||0)+"\n"; });
  md += "\n- Promote vs. keep: "+((p.pa.promoteVsKeep||"").trim()||"—")+"\n";
  md += "- Keep-your-job line (not a promotion factor): "+((p.pa.keepYourJobLine||"").trim()||"—")+"\n";
  md += "- Day-one clarity: "+(p.pa.gwc||"—")+"\n";
  return md;
}
function downloadFile(filename, text, mime){
  const blob = new Blob([text], {type: mime||"text/plain"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  setTimeout(()=>{ document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}
