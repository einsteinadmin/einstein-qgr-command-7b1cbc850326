<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>QGR Triage Room — Q3 2026</title>
<style>
@font-face{font-family:'Roboto';src:url('../QGR%20Packet/assets/fonts/Roboto-400.woff2') format('woff2');font-weight:400;font-display:swap;}
@font-face{font-family:'Roboto';src:url('../QGR%20Packet/assets/fonts/Roboto-500.woff2') format('woff2');font-weight:500;font-display:swap;}
@font-face{font-family:'Roboto';src:url('../QGR%20Packet/assets/fonts/Roboto-700.woff2') format('woff2');font-weight:700;font-display:swap;}
@font-face{font-family:'Bebas Neue';src:url('../QGR%20Packet/assets/fonts/BebasNeue-Regular.ttf') format('truetype');font-weight:400;font-display:swap;}
:root{
  --orange-50:#FEF6EC;--orange-100:#FDE3C2;--orange-500:#EF8B22;--orange-700:#D96B10;--orange-900:#CC5500;
  --navy-50:#EEF1F4;--navy-100:#CDD5DA;--navy-200:#9AADB7;--navy-400:#507080;--navy-500:#27343D;--navy-700:#1A2329;
  --blue-50:#EBF4FB;--blue-100:#C3DFEF;--blue-500:#0979C3;--blue-700:#065E9A;--blue-900:#023B63;
  --grey-50:#F4F5F5;--grey-100:#E2E3E4;--grey-200:#C0C2C4;--grey-400:#787C7F;--grey-500:#53575A;--grey-700:#363839;
  --green:#69995D;--sgreen:#2E7D32;--red:#CC0100;--yellow:#E0A100;
  --sans:'Roboto',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  --display:'Bebas Neue','Roboto Condensed',Impact,var(--sans);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--grey-50);color:var(--navy-500);font-size:14px;line-height:1.45;}
button{font-family:var(--sans);cursor:pointer;}
textarea,input,select{font-family:var(--sans);font-size:13px;color:var(--navy-500);}

/* ---------- header ---------- */
header{background:var(--navy-500);color:#fff;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(11,16,20,.25);}
.hd-top{display:flex;align-items:center;gap:16px;padding:10px 20px 6px;flex-wrap:wrap;}
.hd-title{font-family:var(--display);font-size:28px;letter-spacing:1px;line-height:1;}
.hd-title em{color:var(--orange-500);font-style:normal;}
.hd-sub{font-size:11.5px;color:var(--navy-200);}
.hd-spacer{flex:1;}
.hd-btn{background:var(--blue-500);color:#fff;border:0;border-radius:6px;padding:8px 14px;font-weight:700;font-size:13px;}
.hd-btn:hover{background:var(--blue-700);}
.hd-btn.ghost{background:transparent;border:1px solid var(--navy-400);color:var(--navy-200);font-weight:500;}
.hd-btn.ghost:hover{border-color:#fff;color:#fff;}
.tabs{display:flex;gap:4px;padding:0 20px;}
.tab{background:transparent;border:0;color:var(--navy-200);font-family:var(--display);font-size:19px;letter-spacing:1px;padding:8px 18px 9px;border-bottom:3px solid transparent;}
.tab:hover{color:#fff;}
.tab.active{color:#fff;border-bottom-color:var(--orange-500);}
.tab .cnt{font-family:var(--sans);font-size:11px;background:var(--navy-700);border-radius:9px;padding:1px 7px;margin-left:6px;vertical-align:2px;color:var(--navy-200);}

main{max-width:1600px;margin:0 auto;padding:18px 20px 80px;}

/* leader jump chips */
.jumpbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.jump{background:#fff;border:1px solid var(--navy-100);border-radius:14px;padding:4px 12px;font-size:12px;font-weight:500;color:var(--navy-400);text-decoration:none;}
.jump:hover{border-color:var(--blue-500);color:var(--blue-500);}

/* ---------- leader sections ---------- */
.leader-sec{margin-bottom:26px;}
.leader-hd{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:10px;border-bottom:2px solid var(--navy-100);padding-bottom:6px;}
.leader-name{font-family:var(--display);font-size:24px;letter-spacing:.5px;}
.leader-role{font-size:12px;color:var(--grey-400);}
.badge{display:inline-block;font-size:11px;font-weight:700;border-radius:4px;padding:2px 8px;letter-spacing:.3px;}
.badge.warn{background:var(--red);color:#fff;}
.badge.ok{background:var(--navy-50);color:var(--navy-400);}
.badge.cap{background:var(--orange-100);color:var(--orange-900);}
.badge.hardcap{background:var(--orange-900);color:#fff;}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px;}

/* ---------- generic card ---------- */
.card{background:#fff;border:1px solid var(--navy-100);border-radius:10px;padding:12px 14px;position:relative;display:flex;flex-direction:column;gap:8px;}
.card.diverge{border-color:var(--orange-500);box-shadow:0 0 0 2px var(--orange-100);}
.card.killed{opacity:.55;background:var(--grey-50);}
.card.deferred{opacity:.75;background:var(--grey-50);border-style:dashed;}
.card-top{display:flex;align-items:flex-start;gap:8px;}
.rockid{font-family:var(--display);font-size:17px;color:var(--navy-200);min-width:26px;line-height:1.2;}
.rockname{font-weight:700;font-size:13.5px;flex:1;line-height:1.3;}
.chips{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.chip{font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 7px;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;}
.chip.crit{background:var(--navy-500);color:var(--orange-500);}
.chip.carry-carry{background:var(--blue-50);color:var(--blue-700);border:1px solid var(--blue-100);}
.chip.carry-kill{background:#FBE9E9;color:var(--red);border:1px solid #F2C4C4;}
.chip.carry-restructure{background:var(--orange-50);color:var(--orange-900);border:1px solid var(--orange-100);}
.chip.carry-close{background:#EAF3E8;color:var(--sgreen);border:1px solid #CBE2C6;}
.chip.carry-hold{background:var(--grey-100);color:var(--grey-500);}
.chip.div{background:var(--orange-500);color:var(--navy-700);}
.chip.promoted{background:var(--blue-500);color:#fff;}
.chip.sgonly{background:var(--blue-50);color:var(--blue-700);}
.dot{width:14px;height:14px;border-radius:50%;display:inline-block;flex:none;margin-top:2px;border:2px solid transparent;}
.dot.supergreen{background:var(--sgreen);box-shadow:0 0 0 2px #fff inset;border-color:#9CCB94;}
.dot.green{background:var(--green);}
.dot.red{background:var(--red);}
.dot.yellow{background:var(--yellow);}
.dot.unknown{background:var(--grey-200);}

.ctx{font-size:12px;color:var(--grey-500);}

/* grade selectors */
.graderow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.gradegrp{display:flex;align-items:center;gap:4px;}
.gradelbl{font-size:10px;font-weight:700;color:var(--grey-400);letter-spacing:.6px;width:34px;}
.gbtn{border:1px solid var(--grey-200);background:#fff;border-radius:5px;padding:3px 9px;font-size:11.5px;font-weight:700;color:var(--grey-400);}
.gbtn:hover{border-color:var(--navy-400);color:var(--navy-500);}
.gbtn.sel-SG{background:var(--sgreen);border-color:var(--sgreen);color:#fff;}
.gbtn.sel-G{background:var(--green);border-color:var(--green);color:#fff;}
.gbtn.sel-R{background:var(--red);border-color:var(--red);color:#fff;}

textarea.notes{width:100%;border:1px solid var(--grey-100);border-radius:6px;padding:6px 8px;min-height:34px;resize:vertical;background:#fff;}
textarea.notes:focus{outline:2px solid var(--blue-100);border-color:var(--blue-500);}
textarea.notes::placeholder{color:var(--grey-400);}

/* collapsibles */
details.fold{border-top:1px dashed var(--grey-100);padding-top:6px;}
details.fold summary{cursor:pointer;font-size:11.5px;font-weight:700;color:var(--blue-500);list-style:none;user-select:none;}
details.fold summary::before{content:'▸ ';}
details.fold[open] summary::before{content:'▾ ';}
.fold-body{padding:8px 2px 2px;font-size:12.5px;color:var(--grey-700);display:flex;flex-direction:column;gap:6px;}
.def{padding:6px 9px;border-radius:6px;font-size:12px;line-height:1.45;}
.def b{font-size:10.5px;letter-spacing:.6px;display:block;margin-bottom:2px;}
.def.green{background:#EFF6ED;border-left:3px solid var(--green);}
.def.sg{background:#E9F2E8;border-left:3px solid var(--sgreen);}
.def.why{background:var(--blue-50);border-left:3px solid var(--blue-500);}
.def.theme{background:var(--orange-50);border-left:3px solid var(--orange-500);}
.def.deps{background:var(--navy-50);border-left:3px solid var(--navy-400);}
.aar-empty{color:var(--grey-400);font-style:italic;}

/* triage buttons */
.triage-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.tbtn{border:1px solid var(--grey-200);background:#fff;border-radius:5px;padding:4px 10px;font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--grey-500);}
.tbtn:hover{border-color:var(--navy-400);color:var(--navy-500);}
.tbtn.sel-accept{background:var(--green);border-color:var(--green);color:#fff;}
.tbtn.sel-edit{background:var(--blue-500);border-color:var(--blue-500);color:#fff;}
.tbtn.sel-kill{background:var(--red);border-color:var(--red);color:#fff;}
.tbtn.sel-defer{background:var(--grey-500);border-color:var(--grey-500);color:#fff;}
.tbtn.critbtn{margin-left:auto;}
.tbtn.critbtn.on{background:var(--navy-500);border-color:var(--navy-500);color:var(--orange-500);}

/* bench */
.bench-wrap{margin-top:10px;}
.bench-lbl{font-size:11px;font-weight:700;letter-spacing:.8px;color:var(--grey-400);margin-bottom:6px;text-transform:uppercase;}
.bench-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;}
.bench-card{background:var(--navy-50);border:1px dashed var(--navy-200);border-radius:8px;padding:10px 12px;font-size:12.5px;display:flex;flex-direction:column;gap:6px;}
.bench-card .kind{font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--navy-400);text-transform:uppercase;}
.pbtn{align-self:flex-start;border:1px solid var(--blue-500);background:#fff;color:var(--blue-500);border-radius:5px;padding:3px 10px;font-size:11px;font-weight:700;}
.pbtn:hover{background:var(--blue-500);color:#fff;}

/* open questions strip */
.oq-strip{background:#fff;border:1px solid var(--navy-100);border-radius:10px;padding:12px 14px;margin-bottom:18px;}
.oq-title{font-family:var(--display);font-size:19px;letter-spacing:.5px;margin-bottom:8px;}
.oq-title span{color:var(--orange-700);}
.oq-chips{display:flex;gap:6px;flex-wrap:wrap;}
.oq-chip{border:1px solid var(--grey-200);background:var(--grey-50);border-radius:16px;padding:5px 13px;font-size:12px;font-weight:500;color:var(--navy-500);}
.oq-chip:hover{border-color:var(--blue-500);}
.oq-chip.open-sel{border-color:var(--blue-500);background:var(--blue-50);}
.oq-chip.decided{background:#EAF3E8;border-color:var(--green);color:var(--sgreen);}
.oq-chip.decided::before{content:'✓ ';font-weight:700;}
.oq-detail{margin-top:10px;border-top:1px dashed var(--grey-100);padding-top:10px;display:flex;flex-direction:column;gap:8px;}
.oq-q{font-size:13px;}
.oq-actions{display:flex;gap:8px;align-items:center;}

/* ---------- dependency board ---------- */
.rulebanner{background:var(--navy-500);color:#fff;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13.5px;display:flex;gap:10px;align-items:baseline;}
.rulebanner b{color:var(--orange-500);font-family:var(--display);font-size:18px;letter-spacing:.5px;white-space:nowrap;}
.depcols{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:14px;align-items:start;}
.depcol{background:#fff;border:1px solid var(--navy-100);border-radius:10px;overflow:hidden;}
.depcol-hd{padding:10px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--grey-100);}
.depcol-hd .nm{font-family:var(--display);font-size:20px;letter-spacing:.5px;flex:1;}
.depcol-hd .risk{font-size:10.5px;font-weight:700;border-radius:4px;padding:2px 8px;letter-spacing:.4px;}
.risk.hot{background:var(--red);color:#fff;}
.risk.warm{background:var(--yellow);color:var(--navy-700);}
.risk.fine{background:#EAF3E8;color:var(--sgreen);}
.depcol.hotzone{border-color:var(--red);box-shadow:0 0 0 2px #F2C4C4;}
.depcol.hotzone .depcol-hd{background:#FBE9E9;}
.depcov{font-size:11px;color:var(--grey-400);font-weight:700;}
.deprow{padding:9px 14px;border-bottom:1px solid var(--grey-50);display:flex;flex-direction:column;gap:4px;}
.deprow:last-child{border-bottom:0;}
.deprow.moot{opacity:.45;}
.deprow-top{display:flex;align-items:baseline;gap:8px;}
.dep-from{font-weight:700;font-size:12.5px;flex:1;}
.dep-need{font-size:12px;color:var(--grey-500);}
.dep-note{font-size:11.5px;color:var(--grey-400);}
.pill{font-size:10px;font-weight:700;border-radius:4px;padding:2px 8px;letter-spacing:.5px;white-space:nowrap;}
.pill.covered{background:#EAF3E8;color:var(--sgreen);border:1px solid #CBE2C6;}
.pill.notcovered{background:var(--red);color:#fff;}
.pill.stretch{background:var(--orange-100);color:var(--orange-900);}
.pill.task{background:var(--navy-50);color:var(--navy-400);}
.pill.vendor{background:var(--blue-50);color:var(--blue-700);}
.pill.moot{background:var(--grey-100);color:var(--grey-400);}

/* KPI strip */
.kpis{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 10px;}
.kpi{background:#fff;border:1px solid var(--navy-100);border-radius:8px;padding:7px 12px;font-size:12px;display:flex;gap:8px;align-items:center;}
.kpi b{font-size:12.5px;}

/* toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy-500);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:99;}
#toast.show{opacity:1;}
.smallnote{font-size:11px;color:var(--grey-400);}
#selftest-out{white-space:pre-wrap;font-family:monospace;font-size:11px;background:#fff;border:1px solid var(--grey-200);padding:10px;margin:10px 20px;display:none;}
@media (max-width:1300px){ .cards{grid-template-columns:repeat(auto-fill,minmax(330px,1fr));} }
</style>
</head>

<script>

   ============================================================ */
const VERSION = "QGR Triage Room v1.0 · seeded 2026-07-19 from rock-candidates-q3-DRAFT-2026-07-18.md + dashboard-data.json (7/17)";

const LEADERS = [

/* ---------- Q2 REVIEW seed (dashboard 7/17 + draft carry-over notes) ---------- */

    {k:"mike-q2-0", name:"Personnel Mgmt — Manager Hiring + New Manager Development (Garland + Tampa)", crit:true, status:"green", carry:"carry", carryNote:"→ M2 (standing critical number; hold 106–111% through fall)", context:"7/16: region staffing 106–111% of quarter goal; Tampa >115%; FW intentionally holding (lead-locked). Khevan feedback convo landed well."},

    {k:"mike-q2-3", name:"Mover Training Handbook / Training Video Library", crit:false, status:"supergreen", carry:"carry", carryNote:"→ M1 (the company-wide bet; app IS the Back to School chassis)", context:"Open to ALL of DFWT, 3 wks, zero bugs. Train-the-trainer sim in build. Onboarding tests (90 Qs → 4 staged sections) going into the app."},
    {k:"mike-q2-4", name:"Ideal Team Player Reading", crit:false, status:"supergreen", carry:"close", carryNote:"SG, done — book + one-pager + team survey (4.0/4.5/4.85)", context:"Red → Super Green. Genuine vulnerability moment about hating the read then owning Gerald's write-up."},

  anne: [
    {k:"anne-q2-0", name:"Hire HR Generalist", crit:true, status:"supergreen", carry:"close", carryNote:"SG locked, done — Jalissa now load-bearing in A1", context:"Week 5+: Jalissa owns recruiting follow-up, Handshake outreach, interview-guide redraft, compliance checks. First recurring automation fired on time 7/17."},
    {k:"anne-q2-1", name:"Hiring for Culture / Extended Trial Period + 100-Point Behavioral System", crit:true, status:"green", carry:"carry", carryNote:"→ A1 (HPE go-live Aug 1 — the make-it-real quarter). 100-pt system stays parked (mover-app contingent).", context:"HPE go-live locked for Aug 1 (trial days sunset). Rippling perf-module credits being repurposed with David. Mike's app carries the Extended Trial check-in cadence."},

    {k:"anne-q2-3", name:"Mover Promotion Guidance Metrics", crit:false, status:"green", carry:"carry", carryNote:"→ A2 (first cohort live; execution not design)", context:"Hours floors re-based (LIT 455 / lead 910 / ML 1,820). Rippling hours-since-promotion pull PROVEN 7/17 — 3 movers already past floors. Cadence question open (biweekly vs quarterly)."},

    {k:"anne-q2-5", name:"Ideal Team Player Reading (Bonus)", crit:false, status:"supergreen", carry:"close", carryNote:"SG, done 7/1", context:"Book read, 1-page H/H/S reflection done."}
  ],
  amanda: [
    {k:"amanda-q2-0", name:"AI Call Grading + Regular Reporting (Conversions / Estimate Accuracy)", crit:true, status:"green", carry:"restructure", carryNote:"→ C1. Engine complete; the 7/15 admission: the gap is distribution + a coaching loop. $ Conversion RED — restructure, don't carry the number (19.9% vs 40% target aren't on the same basis; two definition changes, no clean bridge — Matisen 7/15). C2 replaces it with undistorted funnel metrics.", context:"Grading engine steady, rubric tweaks in. Weekly cadence at a standstill (sales class running). No reply from Matisen on the 7/3 EMMA integration ask. ⚠ Company # shows 46% within-20% accuracy vs 80% aspiration = RED stands."},

const LS_KEY = "qgr-triage-q3-state";
let state = loadState();
function blankState(){ return {version:1, q2:{}, q3:{}, oq:{}, view:"review"}; }
function loadState(){
  try{ const raw = localStorage.getItem(LS_KEY); if(raw){ const s = JSON.parse(raw); return Object.assign(blankState(), s); } }catch(e){}
  return blankState();
}
let saveEnabled = true;
function save(){ if(!saveEnabled) return; try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }
function q2s(k){ if(!state.q2[k]) state.q2[k] = {proj:null, self:null, notes:"", aar:""}; return state.q2[k]; }
function q3s(id){ if(!state.q3[id]) state.q3[id] = {decision:null, editNotes:"", crit:null, promoted:false}; return state.q3[id]; }
function oqs(id){ if(!state.oq[id]) state.oq[id] = {decided:false, answer:""}; return state.oq[id]; }

/* rock lookup */
const ROCK_INDEX = {};
LEADERS.forEach(l=>{
  const g = Q3[l.id]; if(!g) return;
  g.rocks.forEach(r=>ROCK_INDEX[r.id] = {rock:r, leader:l.id, bench:false});
  g.bench.forEach(b=>ROCK_INDEX[b.id] = {rock:b, leader:l.id, bench:true});
});
function isCrit(id){ const st = q3s(id); if(st.crit === null || st.crit === undefined) return !!ROCK_INDEX[id].rock.crit; return st.crit; }
function rockLifecycle(id){ // active | killed | deferred | bench
  const e = ROCK_INDEX[id]; if(!e) return "unknown";
  const st = q3s(id);
  if(e.bench && !st.promoted) return "bench";
  if(st.decision === "kill") return "killed";
  if(st.decision === "defer") return "deferred";
  return "active";
}
function depStatus(d){
  // dependent rock moot?
  if(d.fromRock && ROCK_INDEX[d.fromRock]){
    const lc = rockLifecycle(d.fromRock);
    if(lc === "killed" || lc === "deferred") return {code:"moot", label:"MOOT — dependent rock "+lc};
  }
  if(!d.coveredBy){
    if(d.kind === "task") return {code:"task", label:"TASK-LEVEL"};
    if(d.kind === "vendor") return {code:"vendor", label:"VENDOR-SCOPED"};
    return {code:"notcovered", label:"NOT COVERED"};
  }
  const lc = rockLifecycle(d.coveredBy);
  if(lc === "killed" || lc === "deferred") return {code:"notcovered", label:"NOT COVERED — "+d.coveredBy+" "+lc};
  if(lc === "bench") return {code:"stretch", label:"STRETCH ONLY — "+d.coveredBy+" not in slate"};
  return {code:"covered", label:"COVERED · "+d.coveredBy};
}

function critCount(leaderId){
  const g = Q3[leaderId]; let n=0;
  g.rocks.forEach(r=>{ if(rockLifecycle(r.id)==="active" && isCrit(r.id)) n++; });
  g.bench.forEach(b=>{ if(rockLifecycle(b.id)==="active" && isCrit(b.id)) n++; });
  return n;
}
function activeCount(leaderId){
  const g = Q3[leaderId]; let n=0;
  g.rocks.forEach(r=>{ if(rockLifecycle(r.id)==="active") n++; });
  g.bench.forEach(b=>{ if(rockLifecycle(b.id)==="active") n++; });
  return n;
}

function renderTriage(){
  // open questions strip
  const selOq = state._oqSel;
  let html = `<div class="oq-strip"><div class="oq-title">Open Questions <span>— 5 decisions the draft can't settle</span></div>
    <div class="oq-chips">`+OPEN_QUESTIONS.map(q=>{
      const s = oqs(q.id);
      return `<button class="oq-chip ${s.decided?'decided':''} ${selOq===q.id?'open-sel':''}" data-act="oqsel" data-id="${q.id}">${esc(q.short)}</button>`;
    }).join("")+`</div>`;
  if(selOq){
    const q = OPEN_QUESTIONS.find(x=>x.id===selOq); const s = oqs(selOq);
    html += `<div class="oq-detail"><div class="oq-q">${esc(q.text)}</div>
      <textarea class="notes" data-act="oqanswer" data-key="${q.id}" placeholder="One-line answer / decision…">${esc(s.answer)}</textarea>
      <div class="oq-actions"><button class="tbtn ${s.decided?'sel-accept':''}" data-act="oqdecide" data-id="${q.id}">${s.decided?'✓ DECIDED — tap to reopen':'MARK DECIDED'}</button></div></div>`;
  }
  html += `</div><div class="jumpbar">`+LEADERS.map(l=>`<a class="jump" href="#tri-${l.id}">${l.name.split(" ")[0]}</a>`).join("")+`</div>`;

  LEADERS.forEach(l=>{
    const g = Q3[l.id]; if(!g) return;
    const nActive = activeCount(l.id);
    const nCrit = critCount(l.id);
    const over = l.cap!==null && nActive > l.cap;
    let capBadge = "";
    if(l.cap!==null){
      capBadge = over
        ? `<span class="badge warn">${nActive}/${l.cap} ROCKS — ${l.hardCap?'OVER HARD CAP':'OVER CAP'}</span>`
        : `<span class="badge ${l.hardCap?'hardcap':'cap'}">${nActive}/${l.cap} rocks${l.hardCap?' · HARD CAP':''}</span>`;
    } else { capBadge = `<span class="badge ok">${nActive} suggestions</span>`; }
    const critBadge = l.id==="others" ? "" :
      (nCrit===2 ? `<span class="badge ok">CRIT 2/2 ✓</span>` : `<span class="badge warn">CRIT ${nCrit}/2 ⚠</span>`);
    html += `<section class="leader-sec" id="tri-${l.id}"><div class="leader-hd">
      <span class="leader-name">${esc(l.name)}</span><span class="leader-role">${esc(l.role)}</span>
      ${capBadge}${critBadge}</div>`;
    if(l.blurb) html += `<div class="ctx" style="margin:-4px 0 10px">${esc(l.blurb)}</div>`;
    html += `<div class="cards">`;
    g.rocks.forEach(r=>{ html += slotCard(r, l.id, false); });
    // promoted bench items render as slot cards
    g.bench.forEach(b=>{ if(q3s(b.id).promoted) html += slotCard(b, l.id, true); });
    html += `</div>`;
    const benched = g.bench.filter(b=>!q3s(b.id).promoted);
    if(benched.length){
      html += `<div class="bench-wrap"><div class="bench-lbl">Bench — alternates / stretch / bonus</div><div class="bench-cards">`;
      benched.forEach(b=>{
        html += `<div class="bench-card"><span class="kind">${b.kind}</span><b>${esc(b.id)} · ${esc(b.name)}</b><span>${esc(b.detail)}</span>
          <button class="pbtn" data-act="promote" data-id="${b.id}">⬆ PROMOTE to slate</button></div>`;
      });
      html += `</div></div>`;
    }
    if(g.carryNotes) html += `<details class="fold" style="margin-top:8px"><summary>Q2 carry-over notes</summary><div class="fold-body"><div class="ctx">${esc(g.carryNotes)}</div></div></details>`;
    html += `</section>`;
  });
  return html;
}

function renderDeps(){
  let html = `<div class="rulebanner"><b>The structural rule</b><span>If it's not in the slate, dependent Greens can't assume it. Any rock that needs Matisen must name its Matisen deliverable IN the rock text — and Matisen's 4 rocks are the complete list of what he's building. Statuses below recompute live as triage decisions change.</span></div>
  <div class="depcols">`;
  DEP_COLS.forEach(c=>{
    const rows = DEPS.filter(d=>d.on===c.id);
    const covered = rows.filter(d=>depStatus(d).code==="covered").length;
    const red = rows.filter(d=>depStatus(d).code==="notcovered").length;
    html += `<div class="depcol ${c.risk==='hot'?'hotzone':''}">
      <div class="depcol-hd"><span class="nm">${esc(c.name)}</span>
        <span class="depcov">${covered}/${rows.length} covered${red?` · ${red} red`:''}</span>
        <span class="risk ${c.risk}">${c.risk==='hot'?'RED ZONE':c.risk==='warm'?'WATCH':'FINE'}</span></div>
      <div style="padding:8px 14px;border-bottom:1px solid var(--grey-50)"><span class="dep-note">${esc(c.read)}</span></div>`;
    rows.forEach(d=>{
      const s = depStatus(d);
      html += `<div class="deprow ${s.code==='moot'?'moot':''}" data-dep="${d.id}">
        <div class="deprow-top"><span class="dep-from">${esc(d.from)}</span><span class="pill ${s.code}">${esc(s.label)}${d.sgOnly?' · SG-ONLY':''}</span></div>
        <div class="dep-need">needs: ${esc(d.need)}</div>
        ${d.note?`<div class="dep-note">${esc(d.note)}</div>`:''}
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

function render(){
  renderTabs();
  const m = document.getElementById("main");
  if(state.view==="review") m.innerHTML = renderReview();
  else if(state.view==="triage") m.innerHTML = renderTriage();
  else m.innerHTML = renderDeps();
}

/* ============================================================
   EVENTS (delegated)
   ============================================================ */
document.addEventListener("click", e=>{
  const b = e.target.closest("[data-act]"); if(!b) return;
  const act = b.dataset.act;
  if(act==="grade"){ const st=q2s(b.dataset.key); const f=b.dataset.field; st[f] = st[f]===b.dataset.g?null:b.dataset.g; save(); render(); }
  else if(act==="triage"){ const st=q3s(b.dataset.id); st.decision = st.decision===b.dataset.d?null:b.dataset.d; save(); render(); }
  else if(act==="crit"){ const st=q3s(b.dataset.id); st.crit = !isCrit(b.dataset.id); save(); render(); }
  else if(act==="promote"){ q3s(b.dataset.id).promoted = true; save(); render(); }
  else if(act==="demote"){ const st=q3s(b.dataset.id); st.promoted=false; st.decision=null; save(); render(); }
  else if(act==="oqsel"){ state._oqSel = state._oqSel===b.dataset.id?null:b.dataset.id; render(); }
  else if(act==="oqdecide"){ const s=oqs(b.dataset.id); s.decided=!s.decided; save(); render(); }
});
document.addEventListener("input", e=>{
  const t = e.target; const act = t.dataset && t.dataset.act; if(!act) return;
  if(act==="q2note") q2s(t.dataset.key).notes = t.value;
  else if(act==="q2aar") q2s(t.dataset.key).aar = t.value;
  else if(act==="editnote") q3s(t.dataset.key).editNotes = t.value;
  else if(act==="oqanswer") oqs(t.dataset.key).answer = t.value;
  save();
});

/* ============================================================
   EXPORT
   ============================================================ */
function buildExport(){
  const now = new Date();
  const ts = now.toISOString().replace("T"," ").slice(0,16);
  let md = `# QGR Triage Room — Q3 2026 Decision Log\n\n`;
  md += `*${VERSION}*\n*Exported: ${ts} (local) — for Albert to ingest.*\n\n`;

  // Open questions
  md += `## Open Questions\n\n`;
  OPEN_QUESTIONS.forEach(q=>{
    const s = oqs(q.id);
    md += `- **${q.short}** — ${s.decided?"✅ DECIDED":"⏳ open"}${s.answer?": "+s.answer:""}\n`;
  });
  md += `\n`;

  LEADERS.forEach(l=>{
    const g3 = Q3[l.id]; const g2 = Q2[l.id]||[];
    md += `---\n\n## ${l.name} — ${l.role}\n\n`;

    // Q3 slate
    md += `### Q3 slate\n`;
    const nActive = activeCount(l.id), nCrit = critCount(l.id);
    if(l.cap!==null) md += `*Rocks: ${nActive}/${l.cap}${l.hardCap?" (HARD CAP)":""} · CRIT: ${nCrit}/2${l.id!=="others"&&nCrit!==2?" ⚠":""}*\n\n`;
    const listRock = (r, benchPromoted)=>{
      const st = q3s(r.id); const lc = rockLifecycle(r.id); const crit = isCrit(r.id);
      let line = `- **${r.id} · ${r.name}**`;
      if(crit) line += ` ⭐CRIT`;
      if(benchPromoted) line += ` (PROMOTED from bench)`;
      const dec = st.decision ? st.decision.toUpperCase() : "UNTOUCHED";
      line += ` — ${dec}`;
      if(st.crit!==null && st.crit!==undefined && st.crit !== !!ROCK_INDEX[r.id].rock.crit) line += st.crit?" (CRIT ADDED)":" (CRIT REMOVED)";
      md += line + `\n`;
      if(st.decision==="edit" && st.editNotes) md += `  - Edit notes: ${st.editNotes}\n`;
    };
    g3.rocks.forEach(r=>listRock(r,false));
    g3.bench.forEach(b=>{ if(q3s(b.id).promoted) listRock(b,true); });
    const stillBench = g3.bench.filter(b=>!q3s(b.id).promoted);
    if(stillBench.length) md += stillBench.map(b=>`- _bench (${b.kind}): ${b.id} · ${b.name} — not promoted_`).join("\n")+"\n";
    md += `\n`;

    // Q2 review
    if(g2.length){
      md += `### Q2 review (projected grades)\n`;
      g2.forEach(r=>{
        const st = q2s(r.k);
        let line = `- **${r.name}**${r.crit?" ⭐CRIT":""} — traj: ${r.status} · carry-call: ${CARRY_LABEL[r.carry]}`;
        line += ` · PROJ: ${st.proj?GRADE_LABEL[st.proj]:"—"} · SELF: ${st.self?GRADE_LABEL[st.self]:"— (awaiting sheet)"}`;
        if(st.proj && st.self && st.proj!==st.self) line += ` · ⚠ DIVERGENCE`;
        md += line + `\n`;
        if(st.notes) md += `  - Notes: ${st.notes}\n`;
        if(st.aar) md += `  - AAR: ${st.aar}\n`;
      });
      md += `\n`;
    }
  });

  // Dependency summary
  md += `---\n\n## Dependency status (as triaged)\n\n`;
  DEP_COLS.forEach(c=>{
    const rows = DEPS.filter(d=>d.on===c.id);
    const covered = rows.filter(d=>depStatus(d).code==="covered").length;
    md += `### On ${c.name} — ${covered}/${rows.length} covered\n`;
    rows.forEach(d=>{
      const s = depStatus(d);
      md += `- ${d.from} needs *${d.need}* → **${s.label}**${d.sgOnly?" (SG-only)":""}${d.note?" — "+d.note:""}\n`;
    });
    md += `\n`;
  });
  md += `\n> Structural rule: if it's not in the slate, dependent Greens can't assume it.\n`;
  return md;
}
function doExport(){
  const md = buildExport();
  const stamp = new Date().toISOString().slice(0,10);
  // clipboard
  const done = ()=>toast("Decision log copied to clipboard + downloaded ✓");
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(md).then(done, done);
  }
  // download
  const blob = new Blob([md], {type:"text/markdown"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `qgr-q3-decision-log-${stamp}.md`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 2000);
  if(!(navigator.clipboard && navigator.clipboard.writeText)) toast("Decision log downloaded ✓ (clipboard unavailable)");
}
function toast(msg){
  const t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 2600);
}
document.getElementById("btn-export").onclick = doExport;
document.getElementById("btn-reset").onclick = ()=>{
  if(confirm("Reset ALL triage decisions, grades, notes, and open-question answers? This can't be undone.")){
    localStorage.removeItem(LS_KEY); state = blankState(); render(); toast("Reset complete");
  }
};
document.addEventListener("keydown", e=>{
  if(e.target.matches("textarea,input,select")) return;
  if(e.key==="e" || e.key==="E"){ e.preventDefault(); doExport(); }
});

/* hash routing */
function applyHash(){
  const h = location.hash;
  const v = VIEWS.find(v=>v.hash===h);
  if(v) state.view = v.id;
}
window.addEventListener("hashchange", ()=>{ applyHash(); render(); });

/* ============================================================
   SELF-TEST (#selftest) — headless verification hook, no state writes
   ============================================================ */
function runSelfTest(){
  saveEnabled = false;
  const out = [];
  out.push("== QGR Triage Room self-test ==");
  out.push("leaders: " + LEADERS.length + " (" + LEADERS.map(l=>l.id).join(",") + ")");
  const q3counts = LEADERS.map(l=>l.id+":"+Q3[l.id].rocks.length+"+"+Q3[l.id].bench.length+"bench").join(" ");
  out.push("q3 rocks: " + q3counts);
  out.push("q3 slate total: " + Object.values(Q3).reduce((a,g)=>a+g.rocks.length,0) + " · bench: " + Object.values(Q3).reduce((a,g)=>a+g.bench.length,0));
  out.push("q2 cards: " + Object.values(Q2).reduce((a,v)=>a+v.length,0));
  out.push("deps: " + DEPS.length + " rows / " + DEP_COLS.length + " columns");
  out.push("open questions: " + OPEN_QUESTIONS.length);
  // baseline dep status for Amanda C2 (d2, covered by T4)
  const d2 = DEPS.find(d=>d.id==="d2");
  out.push("d2 (Amanda C2 ← T4) baseline: " + depStatus(d2).code + " [expect covered]");
  // simulate KILL of T4
  q3s("T4").decision = "kill";
  out.push("after KILL T4: d2 = " + depStatus(d2).code + " [expect notcovered]");
  q3s("T4").decision = null;
  out.push("after restore: d2 = " + depStatus(d2).code + " [expect covered]");
  // stretch promote test: d14 covered by bench T-S1
  const d14 = DEPS.find(d=>d.id==="d14");
  out.push("d14 (timestamps ← T-S1 bench) baseline: " + depStatus(d14).code + " [expect stretch]");
  q3s("T-S1").promoted = true;
  out.push("after PROMOTE T-S1: d14 = " + depStatus(d14).code + " [expect covered]");
  q3s("T-S1").promoted = false;
  // CRIT counters
  out.push("crit counts baseline: " + LEADERS.filter(l=>l.id!=="others").map(l=>l.id+":"+critCount(l.id)).join(" ") + " [expect all 2]");
  q3s("M3").crit = true;
  out.push("after make-CRIT M3: mike=" + critCount("mike") + " [expect 3 → warns]");
  q3s("M3").crit = null;
  // export
  const md = buildExport();
  out.push("export length: " + md.length + " chars");
  out.push("---- export first 40 lines ----");
  out.push(md.split("\n").slice(0,40).join("\n"));
  const pre = document.getElementById("selftest-out");
  pre.style.display = "block";
  pre.textContent = out.join("\n");
  document.title = "SELFTEST-DONE";
  saveEnabled = true;
}

/* boot */
applyHash();
render();
if(location.hash === "#selftest") runSelfTest();
</script>
